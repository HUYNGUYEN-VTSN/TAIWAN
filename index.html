function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function getExifOrientation(file) {
  return new Promise((resolve) => {
    if (!file || file.type !== "image/jpeg") { resolve(1); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const view = new DataView(e.target.result);
        if (view.getUint16(0, false) !== 0xffd8) { resolve(1); return; }
        const length = view.byteLength;
        let offset = 2;
        while (offset < length) {
          const marker = view.getUint16(offset, false); offset += 2;
          if (marker === 0xffe1) {
            if (view.getUint32(offset + 2, false) !== 0x45786966) { resolve(1); return; }
            const little = view.getUint16(offset + 8, false) === 0x4949;
            const tiffOffset = offset + 8;
            const dirOffset = tiffOffset + view.getUint32(tiffOffset + 4, little);
            const tagsCount = view.getUint16(dirOffset, little);
            for (let i = 0; i < tagsCount; i++) {
              const entryOffset = dirOffset + 2 + i * 12;
              if (view.getUint16(entryOffset, little) === 0x0112) {
                resolve(view.getUint16(entryOffset + 8, little)); return;
              }
            }
            resolve(1); return;
          } else if ((marker & 0xff00) !== 0xff00) { break; } else { offset += view.getUint16(offset, false); }
        }
        resolve(1);
      } catch (err) { resolve(1); }
    };
    reader.onerror = () => resolve(1);
    reader.readAsArrayBuffer(file.slice(0, 131072));
  });
}

async function resizeImageToBase64(file, maxDimension) {
  const orientation = await getExifOrientation(file);
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      try {
        const srcW = img.width; const srcH = img.height;
        const swapDimensions = orientation >= 5 && orientation <= 8;
        let outW = swapDimensions ? srcH : srcW; let outH = swapDimensions ? srcW : srcH;
        const longest = Math.max(outW, outH);
        if (longest > maxDimension) {
          const scale = maxDimension / longest;
          outW = Math.round(outW * scale); outH = Math.round(outH * scale);
        }
        const canvas = document.createElement("canvas");
        canvas.width = outW; canvas.height = outH;
        const ctx = canvas.getContext("2d");
        const drawW = swapDimensions ? outH : outW; const drawH = swapDimensions ? outW : outH;

        switch (orientation) {
          case 2: ctx.translate(outW, 0); ctx.scale(-1, 1); break;
          case 3: ctx.translate(outW, outH); ctx.rotate(Math.PI); break;
          case 4: ctx.translate(0, outH); ctx.scale(1, -1); break;
          case 5: ctx.rotate(0.5 * Math.PI); ctx.scale(1, -1); break;
          case 6: ctx.rotate(0.5 * Math.PI); ctx.translate(0, -outW); break;
          case 7: ctx.rotate(-0.5 * Math.PI); ctx.translate(-outH, 0); ctx.scale(1, -1); break;
          case 8: ctx.rotate(-0.5 * Math.PI); ctx.translate(-outH, 0); break;
          default: break;
        }

        ctx.drawImage(img, 0, 0, drawW, drawH);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
        URL.revokeObjectURL(url);
        resolve({ base64: dataUrl.split(",")[1], mimeType: "image/jpeg" });
      } catch (e) { URL.revokeObjectURL(url); reject(e); }
    };
    img.onerror = (e) => { URL.revokeObjectURL(url); reject(e); };
    img.src = url;
  });
}

const MAX_UPLOAD_DIMENSION = 1200; 

async function prepareImageForUpload(file) {
  try {

    return { base64, mimeType: file.type || "image/jpeg" };
  }
}

function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }

async function callProxyOnce(base64, mimeType, prompt) {
  const response = await fetch(PROXY_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ base64, mimeType, prompt, model: GEMINI_MODEL }),
  });

  const resText = await response.text();
  let data;
  try { data = JSON.parse(resText); } catch(pErr) { data = resText; }

  if (!response.ok) {
    const err = new Error("Lỗi proxy (" + response.status + ")");
    err.status = response.status; throw err;
  }
  if (data && data.error) {
    const err = new Error(data.error);
    err.status = data._status || null; throw err;
  }
  return data;
}

async function extractFields(base64, mimeType) {
  // SỬA LỖI: Trả lại Prompt chi tiết để ép AI xuất đúng định dạng JSON thuộc tính
  const prompt = `Đây là ảnh giấy tờ tùy thân (TAC Đài Loan hoặc Visa). Đọc kỹ ảnh và trích xuất chính xác thông tin sau ở dạng JSON object thuần, KHÔNG kèm mã markdown code block, KHÔNG thêm bớt bất kỳ chữ nào ngoài JSON:
{
  "name": "họ tên đầy đủ, viết hoa",
  "dob": "ngày sinh định dạng DD/MM/YYYY hoặc chuỗi gốc nếu mờ",
  "passport": "số hộ chiếu, viết liền viết hoa không khoảng trắng",
  "gender": "M hoặc F (Male/Female quy về M/F)",
  "visaNumber": "Số Visa Mỹ (US Visa Number). Nếu đây là ảnh TAC: tìm số viết tay hoặc khoanh đỏ nằm cạnh/ dưới dòng chữ in 'Holding a ... passport with USA visa' (thường ở góc dưới bên phải mục Authorization Grounds), viết hoa không khoảng trắng. Nếu đây là ảnh VISA/thị thực Mỹ: lấy đúng số Visa in trên tem visa (thường ghi 'Visa No.' hoặc số Foil, dạng 1 chữ cái + 7 số), viết hoa không khoảng trắng. Nếu không tìm thấy, để chuỗi rỗng.",
  "cancelled": true hoặc false (true nếu trên ảnh có bất kỳ con dấu, watermark, hoặc chữ in nào ghi CANCEL, CANCELLED, CANCELED, VOID, HỦY, HỦY BỎ; false nếu không thấy),
  "rawStampText": "chép lại nguyên văn chữ trên con dấu/watermark hủy nếu có, hoặc chuỗi rỗng nếu không có"
}`;

  const MAX_RETRIES = 2;
  const RETRY_DELAY_MS = 2000;
  let lastErr = null;

  for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
    try {
      const data = await callProxyOnce(base64, mimeType, prompt);
      let text = "";
      
      if (data && data.candidates && data.candidates[0]?.content?.parts) {
        text = data.candidates[0].content.parts.map(p => p.text || "").join("");
      } else if (typeof data === "string") {
        text = data;
      } else if (data && typeof data === "object") {
        if(data.name !== undefined) return data;
      }

      let cleaned = text.replace(/```json|```/g, "").trim();
      const firstBrace = cleaned.indexOf("{");
      const lastBrace = cleaned.lastIndexOf("}");
      if (firstBrace !== -1 && lastBrace !== -1) {
        cleaned = cleaned.slice(firstBrace, lastBrace + 1);
      }

      return JSON.parse(cleaned);
    } catch (err) {
      lastErr = err;
      const isTransient = err.status === 429 || err.status === 503 || /429|quota|overloaded/i.test(err.message || "");
      if (!isTransient || attempt === MAX_RETRIES) throw err;
      await sleep(RETRY_DELAY_MS);
    }
  }
  throw lastErr;
}

function removeVietnameseTones(str) {
  if (!str) return "";
  str = str.replace(/à|á|ạ|ả|ã|â|ầ|ấ|ậ|ẩ|ẫ|ă|ằ|ắ|ặ|ẳ|ẵ/g, "a");
  str = str.replace(/è|é|ẹ|ẻ|ẽ|ê|ề|ế|ệ|ể|ễ/g, "e");
  str = str.replace(/ì|í|ị|ỉ|ĩ/g, "i");
  str = str.replace(/ò|ó|ọ|ỏ|õ|ô|ồ|ố|ộ|ổ|ỗ|ơ|ờ|ớ|ợ|ở|ỡ/g, "o");
  // SỬA LỖI: Xoá chữ "á" bị lẫn trong hàng chữ u thường
  str = str.replace(/ù|ú|ụ|ủ|ũ|ư|ừ|ứ|ự|ử|ữ/g, "u");
  str = str.replace(/ỳ|ý|ỵ|ỷ|ỹ/g, "y");
  str = str.replace(/đ/g, "d");
  str = str.replace(/À|Á|Ạ|Ả|Ã|Â|Ầ|Ấ|Ậ|Ẩ|Ẫ|Ă|Ằ|Ắ|Ặ|Ẳ|Ẵ/g, "A");
  str = str.replace(/È|É|Ẹ|Ẻ|Ẽ|Ê|Ề|Ế|Ệ|Ể|Ễ/g, "E");
  str = str.replace(/Ì|Í|Ị|Ỉ|Ĩ/g, "I");
  str = str.replace(/Ò|Ó|Ọ|Ỏ|Õ|Ô|Ồ|Ố|Ộ|Ổ|Ỗ|Ơ|Ờ|Ớ|Ợ|Ở|Ỡ/g, "O");
  // SỬA LỖI: Sửa chữ "Ù" bị trùng lắp lặp lại thành chữ "Ú" ở dải chữ U hoa
  str = str.replace(/Ù|Ú|Ụ|Ủ|Ũ|Ư|Ừ|Ứ|Ự|Ử|Ữ/g, "U");
  str = str.replace(/Ỳ|Ý|Ỵ|Ỷ|Ỹ/g, "Y");
  str = str.replace(/Đ/g, "D");
  str = str.replace(/\u0300|\u0301|\u0303|\u0309|\u0323/g, ""); 
  str = str.replace(/\u02C6|\u0306|\u031B/g, ""); 
  return str;
}

function normalizeDOB(dobStr) {
  if (!dobStr) return "";
  let s = dobStr.toString().trim().toUpperCase().replace(/[\/\-\s]/g, ""); 

  if (/^\d{8}$/.test(s)) {
    if (parseInt(s.substring(0, 4)) > 1900) return s;
    return s.substring(4, 8) + s.substring(2, 4) + s.substring(0, 2);
  }

  const months = { JAN:"01", FEB:"02", MAR:"03", APR:"04", MAY:"05", JUN:"06", JUL:"07", AUG:"08", SEP:"09", OCT:"10", NOV:"11", DEC:"12" };
  const matchEnglish = s.match(/^(\d{1,2})([A-Z]{3})(\d{2,4})$/);
  if (matchEnglish) {
    let day = matchEnglish[1].padStart(2, "0");
    let month = months[matchEnglish[2]] || "00";
    let year = matchEnglish[3];
    if (year.length === 2) {
      year = (parseInt(year) > 30 ? "19" : "20") + year;
    }
    return year + month + day;
  }

  return s; 
}

function normalizeForCompare(value, fieldType) {
  if (!value) return "";
  let s = value.toString().trim().toUpperCase();

  if (fieldType === "name") {
    return removeVietnameseTones(s).replace(/\s+/g, " ");
  }
  if (fieldType === "gender") {
    if (s === "MALE" || s === "M") return "M";
    if (s === "FEMALE" || s === "F") return "F";
    return s;
  }
  if (fieldType === "dob") {
    return normalizeDOB(s);
  }
  return s.replace(/\s+/g, " ");
}

// Kiểm tra xem dữ liệu đọc được có dấu hiệu VISA/TAC đã bị HỦY hay không
// (dựa vào cờ "cancelled" AI trả về + quét toàn bộ giá trị field phòng khi AI không set cờ)
function isCancelledDoc(dataObj) {
  if (!dataObj) return false;
  if (dataObj.cancelled === true) return true;

  const combined = Object.values(dataObj)
    .filter(v => typeof v === "string" || typeof v === "number")
    .join(" ")
    .toUpperCase();

  return /CANCEL/.test(combined);
}
  
function App() {
  const [slotA, setSlotA] = useState({ file: null, preview: null, status: { text: "Chưa xử lý", type: "" }, data: null });

    setSlot(prev => ({ ...prev, file, preview: URL.createObjectURL(file), status: { text: "🔄 Đang xử lý ảnh...", type: "warn" }, data: null }));
    try {
      const prepared = await prepareImageForUpload(file);
      setSlot(prev => ({ ...prev, status: { text: "⚡ Đang gửi AI đọc...", type: "warn" } }));
      
      const result = await extractFields(prepared.base64, prepared.mimeType);
      setSlot(prev => ({ ...prev, status: { text: "✅ Đọc thành công", type: "ok" }, data: result }));
    } catch (err) {
      setSlot(prev => ({ ...prev, status: { text: `❌ Lỗi: ${err.message}`, type: "bad" }, data: null }));
    }
  };

  const handleSelectA = (file) => processFile(file, setSlotA);
  const handleSelectB = (file) => processFile(file, setSlotB);
   
  // Tự động đối chiếu thông tin khi cả 2 bên đều có kết quả từ AI
  const renderCompare = () => {
    if (slotA.status.type === "warn" || slotB.status.type === "warn") {
      return <div>⏳ Hệ thống đang đọc và xử lý thông tin...</div>;
    }
    if (!slotA.data || !slotB.data) {
      return <div>⏳ Chờ đủ dữ liệu từ cả 2 ảnh TAC và VISA...</div>;
    }

    let allMatch = true;

    // Nếu phát hiện dấu/chữ CANCEL - CANCELLED - CANCELED trên TAC hoặc VISA => luôn luôn KHÔNG HỢP LỆ
    const cancelledA = isCancelledDoc(slotA.data);
    const cancelledB = isCancelledDoc(slotB.data);
    const isCancelled = cancelledA || cancelledB;
    if (isCancelled) allMatch = false;

    const rows = Object.keys(FIELD_LABELS).map(key => {
      const valA = slotA.data[key] || "";
      const valB = slotB.data[key] || "";
      
      const match = normalizeForCompare(valA, key) === normalizeForCompare(valB, key);
      if (!match) allMatch = false;

      return (
        <div className="row" key={key}>
          <div className="label">{FIELD_LABELS[key]}</div>
          <div className={match ? "good" : "badc"}>{valA || "Không đọc được"}</div>
          <div className={match ? "good" : "badc"}>{valB || "Không đọc được"}</div>
          {/* Tách riêng cột icon ra ở cuối hàng, tự động thẳng tắp một dải từ trên xuống */}
          <div className="compare-cell flag">
            {match ? "✅" : "❌"}
          </div>
        </div>
      );
    });

    return (
      <div>
        <div className="row" style={{ fontWeight: "bold", borderBottom: "2px solid #22304f" }}>
          <div className="label">Trường dữ liệu</div>
          <div style={{color:'#4da3ff'}}>Dữ liệu TAC</div>
          <div style={{color:'#4da3ff'}}>Dữ liệu VISA</div>
          <div className="compare-cell flag" style={{color:'#4da3ff'}}>KQ</div>
        </div>
        {rows}
        
        {/* Phần thông báo: Đưa nhãn chữ KẾT QUẢ nổi bật lên đầu dòng và đổi màu khác biệt */}
<div
  className="big"
  style={{
    background: allMatch
      ? "linear-gradient(135deg,#14532d,#166534)"
      : "linear-gradient(135deg,#7f1d1d,#991b1b)",

    border: allMatch
      ? "2px solid #22c55e"
      : "2px solid #ef4444",

    justifyContent: "center",
    flexDirection: "column",
    textAlign: "center",

    boxShadow: allMatch
      ? "0 0 35px rgba(34,197,94,.25)"
      : "0 0 35px rgba(239,68,68,.25)"
  }}
>

  <div
    style={{
      fontSize: 18,
      opacity: .9,
      letterSpacing: 2
    }}
  >
    VERIFICATION RESULT
  </div>

  <div
    style={{
      fontSize: 48,
      fontWeight: 800,
      marginTop: 12,
      marginBottom: 12
    }}
  >
    {allMatch ? "✅ HỢP LỆ" : "❌ KHÔNG HỢP LỆ"}
  </div>

  <div
    style={{
      fontSize: 18,
      opacity: .95
    }}
  >
    {isCancelled
      ? `🚫 VISA/TAC đã bị HỦY (phát hiện dấu CANCEL${cancelledA ? " trên TAC" : ""}${cancelledA && cancelledB ? " và" : ""}${cancelledB ? " trên VISA" : ""})`
      : allMatch
        ? "Tất cả thông tin trên TAC và VISA đều khớp."
        : "Phát hiện ít nhất một trường dữ liệu không khớp."}
  </div>

</div>
      </div>
    );
  };

return (
<div className="wrap">
    <div className="header">
        <div className="logo">
            🛂
        </div>
        <h1>
            VISA MATCH PRO
        </h1>
        <div className="sub">
            AI Powered Document Verification
        </div>
        <div
            style={{
                marginTop:15,
                color:"#64748b",
                fontSize:14
            }}
        >
            Secure • Accurate • Fast
        </div>
    </div>
    <div className="grid">
        <ImageSlot
            title="TAC"
            onSelect={handleSelectA}
            status={slotA.status}
            previewUrl={slotA.preview}
        />
        <ImageSlot
            title="VISA"
            onSelect={handleSelectB}
            status={slotB.status}
            previewUrl={slotB.preview}
        />
    </div>
    <div
        style={{
            height:40
        }}
    />
    <div className="compare">
        <div
            style={{
                display:"flex",
                justifyContent:"space-between",
                alignItems:"center",
                marginBottom:25
            }}
        >
            <div>
                <div
                    style={{
                        fontSize:24,
                        fontWeight:700
                    }}
                >
                    📊 Compare Result
                </div>
                <div
                    style={{
                        color:"#94a3b8",
                        marginTop:6
                    }}
                >
                    AI Verification Summary
                </div>
            </div>
            {
            slotA.data && slotB.data ?
            <div
                style={{
                    background:"#1e293b",
                    padding:"10px 18px",
                    borderRadius:12,
                    color:"#60a5fa",
                    fontWeight:600
                }}
            >
                Ready
            </div>
            :
            <div
                style={{
                    background:"#3b1f1f",
                    padding:"10px 18px",
                    borderRadius:12,
                    color:"#fca5a5",
                    fontWeight:600
                }}
            >
                Waiting...
            </div>
            }
        </div>
        {renderCompare()}
    </div>
    <div
        style={{
            marginTop:50,
            textAlign:"center",
            color:"#64748b",
            fontSize:13
        }}
    >
        Powered by Gemini AI • OCR Engine • Realtime Verification
    </div>
</div>
);
}
   
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
