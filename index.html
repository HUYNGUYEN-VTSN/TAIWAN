<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VISA MATCH PRO</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b1220;
  color:#e8eefc;
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:12px;
}

h1{
  text-align:center;
  color:#4da3ff;
  margin:10px 0 0;
  font-size:20px;
}

.sub{
  text-align:center;
  font-size:12px;
  opacity:.7;
  margin-bottom:10px;
}

/* ===== HORIZONTAL LAYOUT ===== */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* MOBILE */
@media(max-width:768px){
  .grid{
    grid-template-columns:1fr;
  }
}

.card{
  background:#111a2e;
  border:1px solid #22304f;
  border-radius:12px;
  padding:10px;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#1f6fff;
  color:#fff;
  font-weight:600;
  font-size:14px;
}

img{
  width:100%;
  border-radius:10px;
  margin-top:8px;
  max-height:240px;
  object-fit:contain;
  background:#000;
}

.status{
  margin-top:8px;
  font-size:12px;
  text-align:center;
}

.ok{color:#00e676;font-weight:700}
.bad{color:#ff5252;font-weight:700}
.warn{color:#ffb74d;font-weight:700}

.compare{
  margin-top:12px;
  background:#0f1a33;
  border:1px solid #22304f;
  border-radius:12px;
  padding:10px;
}

.row{
  display:grid;
  grid-template-columns:120px 1fr 1fr;
  gap:6px;
  padding:6px 0;
  border-bottom:1px solid #1c2742;
  font-size:12px;
}

.label{
  color:#8fb3ff;
}

.good{
  color:#00e676;
}

.badc{
  color:#ff5252;
}

.big{
  text-align:center;
  font-size:20px;
  margin-top:10px;
  font-weight:800;
}
</style>
</head>

<body>
<div class="wrap">

<h1>VISA MATCH PRO</h1>
<div class="sub">TAC • VISA • REALTIME CHECK</div>

<div class="grid">

  <div class="card">
    <button class="btn" onclick="document.getElementById('fileA').click()">📷 TAC</button>
    <input type="file" id="fileA" accept="image/*" capture="environment" style="display:none;">
    <img id="imgA">
    <div id="stA" class="status">Chưa xử lý</div>
  </div>

  <div class="card">
    <button class="btn" onclick="document.getElementById('fileB').click()">📷 VISA</button>
    <input type="file" id="fileB" accept="image/*" capture="environment" style="display:none;">
    <img id="imgB">
    <div id="stB" class="status">Chưa xử lý</div>
  </div>

</div>

<div class="compare" id="out">
  ⏳ Chờ dữ liệu...
</div>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby1k2ST3w7qxemqJfvJD9maV08eVta8vG-SfYWo5A_6P0_9hpBDycVluvME57yY2Fpa/exec";
const SECRET_TOKEN = "";

// State lưu trữ dữ liệu của 2 bên
const state = {
  a: null,
  b: null,
  loadingA: false,
  loadingB: false
};

/* ===== RESIZE ẢNH SIÊU TỐC ===== */
function resize(file) {
  return new Promise((res, rej) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    
    img.onload = () => {
      URL.revokeObjectURL(url); // Giải phóng bộ nhớ ngay
      const c = document.createElement("canvas");
      const maxW = 1024;
      const scale = img.width > maxW ? maxW / img.width : 1;

      c.width = img.width * scale;
      c.height = img.height * scale;

      const ctx = c.getContext("2d");
      ctx.drawImage(img, 0, 0, c.width, c.height);

      c.toBlob(b => {
        const fr = new FileReader();
        fr.onloadend = () => res(fr.result.split(",")[1]);
        fr.onerror = rej;
        fr.readAsDataURL(b);
      }, "image/jpeg", 0.65);
    };

    img.onerror = () => {
      URL.revokeObjectURL(url);
      rej(new Error("Không thể đọc ảnh"));
    };
    
    img.src = url;
  });
}

/* ===== GỌI AI THỜI GIAN THỰC (Đã fix lỗi CORS bằng text/plain) ===== */
async function callAI(base64, mime) {
  try {
    const res = await fetch(SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" }, 
      body: JSON.stringify({
        base64,
        mimeType: mime,
        token: SECRET_TOKEN,
        prompt: `Extract data: name, dob, passport, gender.`
      })
    });

    if (!res.ok) {
      console.error("Lỗi HTTP Status:", res.status);
      return null;
    }

    const json = await res.json();
    
    // === DÒNG KIỂM TRA QUAN TRỌNG ===
    // Ép trình duyệt phải in toàn bộ kết quả nhận được từ Google bằng chữ màu xanh
    console.log("%c DỮ LIỆU THỰC TẾ NHẬN ĐƯỢC:", "color: #00e676; font-weight: bold;", json);

    // Kiểm tra xem cấu trúc có đúng chuẩn của Gemini không
    if (!json.candidates || !json.candidates[0]) {
      console.warn("Cấu trúc JSON không có thuộc tính 'candidates'. Có thể Google Apps Script trả về lỗi ẩn:", json);
      return null;
    }

    let text = json.candidates[0].content?.parts?.[0]?.text || "";
    if (!text) {
      console.warn("Thuộc tính 'text' bị rỗng. Chi tiết content:", json.candidates[0].content);
      return null;
    }
    
    const data = JSON.parse(text);
    return {
      name: data.name || "-",
      dob: data.dob || "-",
      passport: data.passport || "-",
      gender: data.gender || "-"
    };
  } catch (e) {
    console.error("Quá trình xử lý callAI gặp ngoại lệ sập luồng:", e);
    return null;
  }
}
/* ===== XỬ LÝ CHÍNH ĐA LUỒNG ===== */
async function handle(file, type) {
  if (!file) return;

  const isA = type === "a";
  const imgEl = document.getElementById(isA ? "imgA" : "imgB");
  const stEl = document.getElementById(isA ? "stA" : "stB");

  const previewUrl = URL.createObjectURL(file);
  imgEl.src = previewUrl;
  stEl.innerHTML = "⏳ đang xử lý...";
  
  state[type] = null;
  renderWaiting();

  try {
    const base64 = await resize(file);
    const data = await callAI(base64, file.type);

    if (!data) {
      stEl.innerHTML = "<span class='warn'>⚠ lỗi đọc dữ liệu</span>";
      return;
    }

    stEl.innerHTML = "<span class='ok'>✔ done</span>";
    state[type] = data;

    if (state.a && state.b) {
      renderResult();
    }
  } catch (err) {
    stEl.innerHTML = "<span class='bad'>❌ Lỗi hệ thống</span>";
  }
}

// Lắng nghe sự kiện đổi file
document.getElementById("fileA").onchange = e => handle(e.target.files[0], "a");
document.getElementById("fileB").onchange = e => handle(e.target.files[0], "b");

/* ===== CHUẨN HÓA DỮ LIỆU ĐỂ SO SÁNH ===== */
function cleanStr(str) {
  return (str || "").toString().trim().toLowerCase().replace(/[^a-z0-9]/g, "");
}

function same(a, b) {
  return cleanStr(a) === cleanStr(b);
}

/* ===== GIAO DIỆN CHỜ ===== */
function renderWaiting() {
  document.getElementById("out").innerHTML = `⏳ Đang xử lý và đối sánh dữ liệu...`;
}

/* ===== XUẤT KẾT QUẢ ===== */
function renderResult() {
  const fields = [
    ["NAME", "name"],
    ["DOB", "dob"],
    ["PASSPORT", "passport"],
    ["GENDER", "gender"]
  ];

  let html = "";
  let pass = true;

  fields.forEach(f => {
    const valA = state.a[f[1]] || "-";
    const valB = state.b[f[1]] || "-";
    const ok = same(valA, valB);
    
    if (!ok) pass = false;

    html += `
    <div class="row">
      <div class="label">${f[0]}</div>
      <div class="${ok ? 'good' : 'badc'}">${valA}</div>
      <div class="${ok ? 'good' : 'badc'}">${valB}</div>
    </div>`;
  });

  html += `
  <div class="big ${pass ? 'good' : 'badc'}">
    ${pass ? "PASS 🟢" : "FAIL 🔴"}
  </div>`;

  document.getElementById("out").innerHTML = html;
}
</script>

</body>
</html>
