<script type="text/babel" data-presets="react">

const { useState, useRef } = React;

// =====================================================================
// CẤU HÌNH PROXY
// =====================================================================
const PROXY_URL = "https://script.google.com/macros/s/AKfycbwiimbbALuE7X_a1mHKo9EPpb-SFGwB9oBFnCAwPM9HiVW5ZXInA_8lrhZZr5hll_P4/exec";

// Dùng bản flash-lite để có tốc độ phản hồi tối đa (giảm thêm 30-40% time chờ so với flash thường)
const GEMINI_MODEL = "gemini-2.5-flash-lite"; 

const FIELD_LABELS = {
  name: "Họ tên",
  dob: "Ngày sinh",
  passport: "Số hộ chiếu",
  gender: "Giới tính",
  usaVisaNumber: "Số Visa Mỹ",
};

function normalizeForCompare(value) {
  if (!value) return "";
  return value.toString().trim().toUpperCase().replace(/\s+/g, " ");
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function getExifOrientation(file) {
  return new Promise((resolve) => {
    if (!file || file.type !== "image/jpeg") { resolve(1); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const view = new DataView(e.target.result);
        if (view.getUint16(0, false) !== 0xffd8) { resolve(1); return; }
        const length = view.byteLength;
        let offset = 2;
        while (offset < length) {
          const marker = view.getUint16(offset, false); offset += 2;
          if (marker === 0xffe1) {
            if (view.getUint32(offset + 2, false) !== 0x45786966) { resolve(1); return; }
            const little = view.getUint16(offset + 8, false) === 0x4949;
            const tiffOffset = offset + 8;
            const dirOffset = tiffOffset + view.getUint32(tiffOffset + 4, little);
            const tagsCount = view.getUint16(dirOffset, little);
            for (let i = 0; i < tagsCount; i++) {
              const entryOffset = dirOffset + 2 + i * 12;
              if (view.getUint16(entryOffset, little) === 0x0112) {
                resolve(view.getUint16(entryOffset + 8, little)); return;
              }
            }
            resolve(1); return;
          } else if ((marker & 0xff00) !== 0xff00) { break; } else { offset += view.getUint16(offset, false); }
        }
        resolve(1);
      } catch (err) { resolve(1); }
    };
    reader.onerror = () => resolve(1);
    reader.readAsArrayBuffer(file.slice(0, 131072));
  });
}

async function resizeImageToBase64(file, maxDimension) {
  const orientation = await getExifOrientation(file);
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      try {
        const srcW = img.width; const srcH = img.height;
        const swapDimensions = orientation >= 5 && orientation <= 8;
        let outW = swapDimensions ? srcH : srcW; let outH = swapDimensions ? srcW : srcH;
        const longest = Math.max(outW, outH);
        if (longest > maxDimension) {
          const scale = maxDimension / longest;
          outW = Math.round(outW * scale); outH = Math.round(outH * scale);
        }
        const canvas = document.createElement("canvas");
        canvas.width = outW; canvas.height = outH;
        const ctx = canvas.getContext("2d");
        const drawW = swapDimensions ? outH : outW; const drawH = swapDimensions ? outW : outH;

        switch (orientation) {
          case 2: ctx.translate(outW, 0); ctx.scale(-1, 1); break;
          case 3: ctx.translate(outW, outH); ctx.rotate(Math.PI); break;
          case 4: ctx.translate(0, outH); ctx.scale(1, -1); break;
          case 5: ctx.rotate(0.5 * Math.PI); ctx.scale(1, -1); break;
          case 6: ctx.rotate(0.5 * Math.PI); ctx.translate(0, -outW); break;
          case 7: ctx.rotate(-0.5 * Math.PI); ctx.translate(-outH, 0); ctx.scale(1, -1); break;
          case 8: ctx.rotate(-0.5 * Math.PI); ctx.translate(-outH, 0); break;
          default: break;
        }

        ctx.drawImage(img, 0, 0, drawW, drawH);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.85); // Giảm nhẹ chất lượng xuống 0.85 để file nhẹ hơn nữa
        URL.revokeObjectURL(url);
        resolve({ base64: dataUrl.split(",")[1], mimeType: "image/jpeg" });
      } catch (e) { URL.revokeObjectURL(url); reject(e); }
    };
    img.onerror = (e) => { URL.revokeObjectURL(url); reject(e); };
    img.src = url;
  });
}

// HẠ XUỐNG 1200: Bước nhảy vọt về tốc độ xử lý và upload truyền qua mạng
const MAX_UPLOAD_DIMENSION = 1200; 

async function prepareImageForUpload(file) {
  try {
    return await resizeImageToBase64(file, MAX_UPLOAD_DIMENSION);
  } catch (e) {
    const base64 = await fileToBase64(file);
    return { base64, mimeType: file.type || "image/jpeg" };
  }
}

function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }

async function callProxyOnce(base64, mimeType, prompt) {
  const response = await fetch(PROXY_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ base64, mimeType, prompt, model: GEMINI_MODEL }),
  });

  const resText = await response.text();
  let data;
  try { data = JSON.parse(resText); } catch(pErr) { data = resText; }

  if (!response.ok) {
    const err = new Error("Lỗi proxy (" + response.status + ")");
    err.status = response.status; throw err;
  }
  if (data && data.error) {
    const err = new Error(data.error);
    err.status = data._status || null; throw err;
  }
  return data;
}

async function extractFields(base64, mimeType) {
  const prompt = `Phân tích ảnh giấy tờ tùy thân (TAC Đài Loan hoặc Visa). Trích xuất chính xác cấu trúc JSON yêu cầu.`;

  const MAX_RETRIES = 2;
  const RETRY_DELAY_MS = 2000;
  let lastErr = null;

  for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
    try {
      const data = await callProxyOnce(base64, mimeType, prompt);
      let text = "";
      
      // Khớp cấu trúc dữ liệu trả về từ GAS
      if (data && data.candidates && data.candidates[0]?.content?.parts) {
        text = data.candidates[0].content.parts.map(p => p.text || "").join("");
      } else if (typeof data === "string") {
        text = data;
      } else if (data && typeof data === "object") {
        // Nếu GAS trả trực tiếp object đã được parse
        if(data.name !== undefined) return data;
      }

      let cleaned = text.replace(/```json|```/g, "").trim();
      const firstBrace = cleaned.indexOf("{");
      const lastBrace = cleaned.lastIndexOf("}");
      if (firstBrace !== -1 && lastBrace !== -1) {
        cleaned = cleaned.slice(firstBrace, lastBrace + 1);
      }

      const parsed = JSON.parse(cleaned);
      parsed.cancelled = parsed.cancelled === true || String(parsed.cancelled).toLowerCase() === "true";
      return parsed;
    } catch (err) {
      lastErr = err;
      const isTransient = err.status === 429 || err.status === 503 || /429|quota|overloaded/i.test(err.message || "");
      if (!isTransient || attempt === MAX_RETRIES) throw err;
      await sleep(RETRY_DELAY_MS);
    }
  }
  throw lastErr;
}
