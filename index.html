<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TAC ⇄ VISA CHECK</title>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

<style>

@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --navy-950:#ffffff;
  --navy-900:#ffffff;
  --navy-800:#eef1fb;
  --navy-700:#d7deef;
  --steel-400:#647088;
  --steel-300:#36415a;
  --paper:#0c1830;
  --amber:#e8930a;
  --amber-dim:#fde7bf;
  --green:#0fa968;
  --green-dim:#dcf7ea;
  --red:#e0383f;
  --red-dim:#fde1e1;
  --accent:#3454e8;
  --accent-dim:#e8edfd;
  --accent-deep:#1c2f6e;
}

*{box-sizing:border-box; margin:0; padding:0;}

body{
  font-family:'IBM Plex Mono', monospace;
}

.page{
  min-height:100vh;
  background:
    radial-gradient(circle at 10% -5%, rgba(52,84,232,0.10), transparent 42%),
    radial-gradient(circle at 95% 10%, rgba(232,147,10,0.08), transparent 38%),
    radial-gradient(circle at 50% 100%, rgba(15,169,104,0.06), transparent 45%),
    var(--navy-950);
  color:var(--paper);
  padding:32px 20px 60px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.header{
  width:100%;
  max-width:920px;
  margin-bottom:28px;
}

.header-top{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:12px;
  border-bottom:2px solid var(--accent-deep);
  padding-bottom:16px;
  flex-wrap:wrap;
}

.header-eyebrow{
  font-size:11px;
  letter-spacing:0.18em;
  color:var(--accent);
  text-transform:uppercase;
  font-weight:600;
}

.header h1{
  font-family:'Space Grotesk', sans-serif;
  font-size:32px;
  font-weight:700;
  margin:6px 0 0;
  letter-spacing:-0.01em;
  background:linear-gradient(120deg, var(--accent-deep), var(--accent) 55%, var(--amber));
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.header-sub{
  font-size:12.5px;
  color:var(--steel-300);
  max-width:520px;
  line-height:1.5;
}

.gate-id{
  font-family:'Space Grotesk', sans-serif;
  font-size:13px;
  font-weight:700;
  color:#ffffff;
  background:linear-gradient(135deg, var(--accent-deep), var(--accent));
  padding:7px 14px;
  border-radius:6px;
  white-space:nowrap;
  letter-spacing:0.03em;
  box-shadow:0 2px 8px rgba(52,84,232,0.25);
}

.disclaimer{
  margin-top:14px;
  font-size:11.5px;
  color:var(--steel-400);
  background:rgba(245,185,66,0.06);
  border:1px solid rgba(245,185,66,0.25);
  border-radius:6px;
  padding:10px 14px;
  line-height:1.5;
}

.disclaimer b{ color:var(--amber); }

.main{
  width:100%;
  max-width:920px;
}

.slots{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  margin-bottom:24px;
}

@media (max-width:640px){
  .slots{ grid-template-columns:1fr; }
}

.slot{
  background:var(--navy-900);
  border:1px solid var(--navy-700);
  border-top:3px solid var(--accent);
  border-radius:10px;
  padding:16px;
  box-shadow:0 4px 16px rgba(28,47,110,0.08);
  transition:box-shadow .2s, transform .2s;
}

.slot:hover{
  box-shadow:0 8px 24px rgba(28,47,110,0.13);
  transform:translateY(-1px);
}

.slot-head{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  margin-bottom:12px;
}

.slot-index{
  font-family:'Space Grotesk', sans-serif;
  font-size:13px;
  font-weight:700;
  color:var(--accent-deep);
  background:var(--accent-dim);
  padding:3px 10px;
  border-radius:5px;
}

.slot-subtitle{
  font-size:11px;
  color:var(--steel-400);
}

.slot-drop{
  position:relative;
  aspect-ratio:4/3;
  border:1.5px dashed var(--navy-700);
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  overflow:hidden;
  background:var(--navy-800);
  transition:border-color .15s;
}

.slot-drop:hover{
  border-color:var(--accent);
}

.slot-drop.has-image{
  border-style:solid;
  border-color:var(--accent-dim);
}

.slot-drop img{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#1a1a1a;
}

.slot-empty{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  color:var(--steel-400);
  font-size:12px;
}

.slot-overlay{
  position:absolute;
  inset:0;
  background:rgba(12,24,48,0.9);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-size:12px;
  color:var(--amber);
}

.spinner{
  width:22px;
  height:22px;
  border-radius:50%;
  border:2.5px solid rgba(232,147,10,0.25);
  border-top-color:var(--amber);
  animation:spin 0.8s linear infinite;
}

@keyframes spin{ to{ transform:rotate(360deg); } }

.compare-table{
  background:var(--navy-900);
  border:1px solid var(--navy-700);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:20px;
  box-shadow:0 4px 16px rgba(28,47,110,0.08);
}

.compare-row{
  display:grid;
  grid-template-columns:120px 1fr 1fr 36px;
  border-bottom:1px solid var(--navy-800);
}

.compare-row:last-child{ border-bottom:none; }

.compare-row.head{
  background:var(--accent-dim);
}

.compare-cell{
  padding:13px 14px;
  font-size:13px;
  display:flex;
  align-items:center;
}

.compare-row.head .compare-cell{
  font-size:11px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--accent-deep);
  font-weight:700;
}

.compare-cell.label{
  font-family:'Space Grotesk', sans-serif;
  font-weight:600;
  color:var(--steel-300);
}

.compare-cell.value{
  color:var(--paper);
  word-break:break-word;
}

.compare-cell.value.empty{
  color:var(--steel-400);
  font-style:italic;
}

.compare-cell.flag{
  justify-content:center;
}

.match-dot{
  width:12px;
  height:12px;
  border-radius:50%;
}

.match-dot.ok{ background:var(--green); box-shadow:0 0 0 4px rgba(15,169,104,0.18); }
.match-dot.no{ background:var(--red); box-shadow:0 0 0 4px rgba(224,56,63,0.18); }

.verdict{
  display:flex;
  align-items:center;
  gap:14px;
  padding:20px 22px;
  border-radius:10px;
  margin-bottom:20px;
  border:2px solid;
  box-shadow:0 4px 16px rgba(28,47,110,0.06);
}

.verdict.ok{
  background:var(--green-dim);
  border-color:var(--green);
}

.verdict.no{
  background:var(--red-dim);
  border-color:var(--red);
}

.verdict-icon{
  font-family:'Space Grotesk', sans-serif;
  font-size:22px;
  font-weight:700;
  width:46px;
  height:46px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  color:#ffffff;
}

.verdict.ok .verdict-icon{ background:var(--green); }
.verdict.no .verdict-icon{ background:var(--red); }

.verdict-text h2{
  font-family:'Space Grotesk', sans-serif;
  font-size:18px;
  margin:0 0 3px;
  letter-spacing:-0.01em;
}

.verdict.ok .verdict-text h2{ color:var(--green); }
.verdict.no .verdict-text h2{ color:var(--red); }

.verdict-text p{
  font-size:12px;
  color:var(--steel-300);
  margin:0;
  line-height:1.5;
}

.error-box{
  background:rgba(214,64,63,0.07);
  border:1px solid rgba(214,64,63,0.3);
  color:#a02e2d;
  font-size:12.5px;
  padding:12px 14px;
  border-radius:8px;
  margin-bottom:18px;
  line-height:1.5;
}

.actions{
  display:flex;
  justify-content:flex-end;
}

.btn-reset{
  font-family:'IBM Plex Mono', monospace;
  font-size:12.5px;
  font-weight:600;
  color:var(--accent-deep);
  background:var(--accent-dim);
  border:1px solid var(--navy-700);
  border-radius:6px;
  padding:10px 18px;
  cursor:pointer;
  transition:background .15s, transform .15s;
}

.btn-reset:hover{
  background:var(--accent);
  color:#ffffff;
  transform:translateY(-1px);
}

.footer-note{
  margin-top:28px;
  font-size:10.5px;
  color:var(--steel-400);
  text-align:center;
  max-width:600px;
  line-height:1.6;
}

</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" data-presets="react">

const { useState, useRef } = React;

// =====================================================================
// CẤU HÌNH PROXY — web này KHÔNG gọi trực tiếp Gemini API nữa.
// Web gọi qua một Google Apps Script làm trung gian, API key Gemini
// được giữ an toàn bên trong Apps Script (Script Properties),
// không xuất hiện ở bất kỳ đâu trong code web này.
//
// Cách lấy URL: deploy file gemini-proxy.gs thành Web App,
// copy URL dạng https://script.google.com/macros/s/XXXX/exec
// và dán vào đây.
// =====================================================================
const PROXY_URL = "https://script.google.com/macros/s/AKfycbxnQHhKOPckxsZ5BYELPCuGLgRzv1UxXt_WEIQq93Nwhn-TExnwfvkyugBkbar1cB-x/exec";

const GEMINI_MODEL = "gemini-2.5-flash";

const FIELD_LABELS = {
  name: "Họ tên",
  dob: "Ngày sinh",
  passport: "Số hộ chiếu",
  gender: "Giới tính",
};

function normalizeForCompare(value) {
  if (!value) return "";
  return value.toString().trim().toUpperCase().replace(/\s+/g, " ");
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function extractFields(base64, mimeType) {
  const prompt = `Đây là ảnh giấy tờ tùy thân (có thể là Thẻ tạm trú Đài Loan - TAC, hoặc visa nhập cảnh của một quốc gia khác như Mỹ, khối Schengen...).

Đọc kỹ ảnh và trích xuất đúng 4 thông tin sau, ở dạng JSON object, KHÔNG kèm bất kỳ chữ nào khác ngoài JSON, không dùng markdown code block:
{
  "name": "họ tên đầy đủ, viết hoa, đúng như trên giấy tờ",
  "dob": "ngày sinh, định dạng DD/MM/YYYY",
  "passport": "số hộ chiếu (passport number), viết hoa không khoảng trắng",
  "gender": "M hoặc F (Male/Female, Nam/Nữ quy về M/F)"
}

Nếu không đọc được một trường nào, để giá trị là null cho trường đó. Chỉ trả về JSON object thuần, không kèm bất kỳ văn bản nào khác.`;

  if (!PROXY_URL || PROXY_URL.indexOf("DÁN_URL") !== -1) {
    throw new Error("Chưa cấu hình PROXY_URL trong code. Xem hướng dẫn deploy gemini-proxy.gs.");
  }

  const response = await fetch(PROXY_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain;charset=utf-8",
    },
    body: JSON.stringify({
      base64: base64,
      mimeType: mimeType,
      prompt: prompt,
      model: GEMINI_MODEL,
    }),
  });

  if (!response.ok) {
    const errText = await response.text();
    throw new Error("Lỗi proxy (" + response.status + "): " + errText.slice(0, 200));
  }

  const data = await response.json();

  if (data && data.error) {
    throw new Error(data.error);
  }

  let text = "";
  if (data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) {
    text = data.candidates[0].content.parts.map(function(p){ return p.text || ""; }).join("");
  }

  const cleaned = text.replace(/```json|```/g, "").trim();
  return JSON.parse(cleaned);
}

function ImageSlot({ title, subtitle, image, onSelect, status }) {
  const inputRef = useRef(null);

  return (
    <div className="slot">
      <div className="slot-head">
        <span className="slot-index">{title}</span>
        <span className="slot-subtitle">{subtitle}</span>
      </div>

      <div
        className={"slot-drop" + (image ? " has-image" : "")}
        onClick={() => inputRef.current && inputRef.current.click()}
      >
        {image ? (
          <img src={image} alt={subtitle} />
        ) : (
          <div className="slot-empty">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
              <path
                d="M4 16V4h16v12M4 16l4-4 3 3 5-5 4 4M4 16v4h16v-4"
                stroke="currentColor"
                strokeWidth="1.5"
                strokeLinecap="round"
                strokeLinejoin="round"
              />
            </svg>
            <span>Bấm để chọn ảnh</span>
          </div>
        )}

        {status === "reading" && (
          <div className="slot-overlay">
            <div className="spinner"></div>
            <span>Đang đọc dữ liệu...</span>
          </div>
        )}
      </div>

      <input
        ref={inputRef}
        type="file"
        accept="image/*"
        style={{ display: "none" }}
        onChange={(e) => {
          const file = e.target.files && e.target.files[0];
          if (file) onSelect(file);
        }}
      />
    </div>
  );
}

function App() {
  const [imageA, setImageA] = useState(null);
  const [imageB, setImageB] = useState(null);
  const [dataA, setDataA] = useState(null);
  const [dataB, setDataB] = useState(null);
  const [statusA, setStatusA] = useState("idle");
  const [statusB, setStatusB] = useState("idle");
  const [error, setError] = useState("");

  async function handleSelect(file, slot) {
    setError("");
    const setImage = slot === "A" ? setImageA : setImageB;
    const setData = slot === "A" ? setDataA : setDataB;
    const setStatus = slot === "A" ? setStatusA : setStatusB;

    const previewUrl = URL.createObjectURL(file);
    setImage(previewUrl);
    setData(null);
    setStatus("reading");

    try {
      const base64 = await fileToBase64(file);
      const fields = await extractFields(base64, file.type || "image/jpeg");
      setData(fields);
      setStatus("done");
    } catch (err) {
      console.error(err);
      setStatus("error");
      setError(
        "Không đọc được dữ liệu từ ảnh này. " + (err.message || "Thử lại với ảnh rõ hơn hoặc chụp thẳng góc.")
      );
    }
  }

  const bothReady = dataA && dataB;

  const comparisons = bothReady
    ? Object.keys(FIELD_LABELS).map((key) => {
        const a = dataA[key];
        const b = dataB[key];
        const match = a && b && normalizeForCompare(a) === normalizeForCompare(b);
        return { key, label: FIELD_LABELS[key], a, b, match };
      })
    : [];

  const allMatch = comparisons.length > 0 && comparisons.every((c) => c.match);
  const anyMissing =
    bothReady && Object.keys(FIELD_LABELS).some((k) => !dataA[k] || !dataB[k]);

  function reset() {
    setImageA(null);
    setImageB(null);
    setDataA(null);
    setDataB(null);
    setStatusA("idle");
    setStatusB("idle");
    setError("");
  }

  return (
    <div className="page">
      <div className="header">
        <div className="header-top">
          <div>
            <div className="header-eyebrow">Quầy thủ tục · Đối chiếu giấy tờ</div>
            <h1>TAC ⇄ VISA CHECK</h1>
            <div className="header-sub">
              Đọc và so khớp Họ tên, Ngày sinh, Số hộ chiếu, Giới tính giữa hai giấy tờ.
            </div>
          </div>
          <div className="gate-id">GATE · MANUAL REVIEW</div>
        </div>
        <div className="disclaimer">
          <b>Lưu ý:</b> công cụ chỉ đối chiếu dữ liệu đọc được trên hai ảnh, không xác minh tính xác thực hay hiệu lực pháp lý của giấy tờ. Quyết định cuối cùng thuộc về nhân viên thực hiện thủ tục.
        </div>
      </div>

      <div className="main">

        <div className="slots">
          <ImageSlot
            title="01"
            subtitle="TAC Đài Loan"
            image={imageA}
            status={statusA}
            onSelect={(f) => handleSelect(f, "A")}
          />
          <ImageSlot
            title="02"
            subtitle="Visa (US / Schengen / khác)"
            image={imageB}
            status={statusB}
            onSelect={(f) => handleSelect(f, "B")}
          />
        </div>

        {error && <div className="error-box">{error}</div>}

        {bothReady && (
          <React.Fragment>
            <div className="compare-table">
              <div className="compare-row head">
                <div className="compare-cell label">Trường</div>
                <div className="compare-cell value">TAC</div>
                <div className="compare-cell value">Visa</div>
                <div className="compare-cell flag"></div>
              </div>
              {comparisons.map((c) => (
                <div className="compare-row" key={c.key}>
                  <div className="compare-cell label">{c.label}</div>
                  <div className={"compare-cell value" + (!c.a ? " empty" : "")}>
                    {c.a || "Không đọc được"}
                  </div>
                  <div className={"compare-cell value" + (!c.b ? " empty" : "")}>
                    {c.b || "Không đọc được"}
                  </div>
                  <div className="compare-cell flag">
                    <div className={"match-dot " + (c.match ? "ok" : "no")}></div>
                  </div>
                </div>
              ))}
            </div>

            {anyMissing ? (
              <div className="verdict no">
                <div className="verdict-icon">!</div>
                <div className="verdict-text">
                  <h2>THIẾU DỮ LIỆU — KHÔNG ĐỦ CƠ SỞ ĐỐI CHIẾU</h2>
                  <p>Một số trường không đọc được từ ảnh. Vui lòng chụp lại rõ hơn hoặc kiểm tra thủ công.</p>
                </div>
              </div>
            ) : allMatch ? (
              <div className="verdict ok">
                <div className="verdict-icon">✓</div>
                <div className="verdict-text">
                  <h2>HỢP LỆ — DỮ LIỆU KHỚP</h2>
                  <p>Toàn bộ 4 trường thông tin khớp giữa hai giấy tờ.</p>
                </div>
              </div>
            ) : (
              <div className="verdict no">
                <div className="verdict-icon">✕</div>
                <div className="verdict-text">
                  <h2>KHÔNG HỢP LỆ — DỮ LIỆU KHÔNG KHỚP</h2>
                  <p>Có ít nhất một trường không khớp giữa hai giấy tờ. Vui lòng kiểm tra lại thủ công.</p>
                </div>
              </div>
            )}
          </React.Fragment>
        )}

        <div className="actions">
          <button className="btn-reset" onClick={reset}>
            ⟲ Làm lại từ đầu
          </button>
        </div>
      </div>

      <div className="footer-note">
        Kết quả do AI đọc tự động, có thể sai sót với ảnh mờ/nghiêng/lóa sáng.
        Luôn xác minh lại bằng mắt trước khi đưa ra quyết định cuối cùng.
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>

</body>
</html>
