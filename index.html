<style>

@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

body{

}

  display:flex;

}

.header{

.header-top{

.header-eyebrow{

  border:1px solid var(--navy-700);

  font-size:12.5px;

.api-key-box input:focus{

}

.api-key-box label{
  font-size:11.5px;
  color:var(--steel-400);

  white-space:nowrap;

.api-key-status.ok{ color:var(--green); }

.btn-key-action{

  background:transparent;
  border:1px solid var(--navy-700);
  border-radius:6px;
  padding:6px 10px;

  transition:border-color .15s, color .15s;
}

.btn-key-action:hover{

  color:var(--paper);
}

.btn-key-action.danger:hover{
  border-color:var(--red);

  grid-template-columns:1fr 1fr;

  margin-bottom:24px;

.slot{

  border:1px solid var(--navy-700);

  padding:16px;
  box-shadow:0 1px 3px rgba(15,33,56,0.06);

.slot-head{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  margin-bottom:12px;
}

.slot-index{
  font-family:'Space Grotesk', sans-serif;
  font-size:13px;

  color:var(--steel-300);
}

.slot-subtitle{
  font-size:11px;
  color:var(--steel-400);
}

.slot-drop{
  position:relative;
  aspect-ratio:4/3;
  border:1.5px dashed var(--navy-700);
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  overflow:hidden;
  background:var(--navy-800);
  transition:border-color .15s;
}

.slot-drop:hover{
  border-color:var(--steel-400);
}

.slot-drop.has-image{
  border-style:solid;
  border-color:var(--navy-700);
}

.slot-drop img{
  width:100%;
  height:100%;
  object-fit:contain;
  background:#1a1a1a;

  flex-direction:column;
  align-items:center;

  color:var(--steel-400);

}

.slot-overlay{
  position:absolute;
  inset:0;
  background:rgba(10,22,40,0.88);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  font-size:12px;
  color:var(--amber);

.spinner{
  width:22px;
  height:22px;
  border-radius:50%;
  border:2.5px solid rgba(245,185,66,0.25);

@keyframes spin{ to{ transform:rotate(360deg); } }

  background:var(--navy-900);
  border:1px solid var(--navy-700);
  border-radius:10px;
  overflow:hidden;
  margin-bottom:20px;
  box-shadow:0 1px 3px rgba(15,33,56,0.06);
}

.compare-row{
  display:grid;
  grid-template-columns:120px 1fr 1fr 36px;
  border-bottom:1px solid var(--navy-800);
}

.compare-row:last-child{ border-bottom:none; }

.compare-row.head{
  background:var(--navy-800);
}

.compare-cell{
  padding:13px 14px;
  font-size:13px;
  display:flex;
  align-items:center;
}

.compare-row.head .compare-cell{
  font-size:11px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--steel-400);
}

.compare-cell.label{
  font-family:'Space Grotesk', sans-serif;
  font-weight:600;
  color:var(--steel-300);
}

.compare-cell.value{
  color:var(--paper);
  word-break:break-word;
}

.compare-cell.value.empty{
  color:var(--steel-400);
  font-style:italic;
}

.compare-cell.flag{
  justify-content:center;
}

.match-dot{
  width:10px;
  height:10px;
  border-radius:50%;
}

.match-dot.ok{ background:var(--green); box-shadow:0 0 8px rgba(61,220,132,0.5); }
.match-dot.no{ background:var(--red); box-shadow:0 0 8px rgba(255,92,92,0.5); }

.verdict{
  display:flex;
  align-items:center;
  gap:14px;
  padding:20px 22px;
  border-radius:10px;
  margin-bottom:20px;
  border:1px solid;
}

.verdict.ok{
  background:rgba(61,220,132,0.07);
  border-color:rgba(61,220,132,0.35);
}

.verdict.no{
  background:rgba(255,92,92,0.07);
  border-color:rgba(255,92,92,0.35);
}

.verdict-icon{
  font-family:'Space Grotesk', sans-serif;
  font-size:20px;
  font-weight:700;
  width:42px;
  height:42px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.verdict.ok .verdict-icon{ background:var(--green-dim); color:var(--green); }
.verdict.no .verdict-icon{ background:var(--red-dim); color:var(--red); }

.verdict-text h2{
  font-family:'Space Grotesk', sans-serif;
  font-size:17px;
  margin:0 0 3px;
}

.verdict.ok .verdict-text h2{ color:var(--green); }
.verdict.no .verdict-text h2{ color:var(--red); }

.verdict-text p{
  font-size:12px;
  color:var(--steel-300);
  margin:0;
  line-height:1.5;
}

.error-box{
  background:rgba(214,64,63,0.07);
  border:1px solid rgba(214,64,63,0.3);
  color:#a02e2d;
  font-size:12.5px;
  padding:12px 14px;
  border-radius:8px;
  margin-bottom:18px;
  line-height:1.5;
}

.actions{
  display:flex;
  justify-content:flex-end;
}

.btn-reset{
  font-family:'IBM Plex Mono', monospace;
  font-size:12px;
  color:var(--steel-300);
  background:transparent;
  border:1px solid var(--navy-700);
  border-radius:6px;
  padding:9px 16px;
  cursor:pointer;
  transition:border-color .15s, color .15s;
}

.btn-reset:hover{
  border-color:var(--steel-400);
  color:var(--paper);
}

.footer-note{
  margin-top:28px;
  font-size:10.5px;
  color:var(--steel-400);
  text-align:center;
  max-width:600px;
  line-height:1.6;
}

</style>

<body>

<div id="root"></div>

<script type="text/babel" data-presets="react">

const { useState, useRef } = React;

// API key được người dùng nhập một lần và lưu trong localStorage của trình duyệt
// (chỉ trên máy đang dùng, không gửi đi đâu ngoài việc gọi thẳng tới Gemini API).

const GEMINI_MODEL = "gemini-2.5-flash";
const STORAGE_KEY = "tacc_visa_gemini_api_key";

const FIELD_LABELS = {
  name: "Họ tên",
  dob: "Ngày sinh",
  passport: "Số hộ chiếu",
  gender: "Giới tính",
};

function normalizeForCompare(value) {
  if (!value) return "";
  return value.toString().trim().toUpperCase().replace(/\s+/g, " ");
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function extractFields(base64, mimeType, apiKey) {
  const prompt = `Đây là ảnh giấy tờ tùy thân (có thể là Thẻ tạm trú Đài Loan - TACC, hoặc visa nhập cảnh của một quốc gia khác như Mỹ, khối Schengen...).

Đọc kỹ ảnh và trích xuất đúng 4 thông tin sau, ở dạng JSON object, KHÔNG kèm bất kỳ chữ nào khác ngoài JSON, không dùng markdown code block:
{
  "name": "họ tên đầy đủ, viết hoa, đúng như trên giấy tờ",
  "dob": "ngày sinh, định dạng DD/MM/YYYY",
  "passport": "số hộ chiếu (passport number), viết hoa không khoảng trắng",
  "gender": "M hoặc F (Male/Female, Nam/Nữ quy về M/F)"
}

Nếu không đọc được một trường nào, để giá trị là null cho trường đó. Chỉ trả về JSON object thuần, không kèm bất kỳ văn bản nào khác.`;

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`;

  const response = await fetch(url, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-goog-api-key": apiKey,
    },
    body: JSON.stringify({
      contents: [
        {
          parts: [
            { text: prompt },
            {
              inline_data: {
                mime_type: mimeType,
                data: base64,
              },
            },
          ],
        },
      ],
    }),
  });

  if (!response.ok) {
    const errText = await response.text();
    throw new Error("Lỗi API (" + response.status + "): " + errText.slice(0, 200));
  }

  const data = await response.json();
  let text = "";
  if (data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) {
    text = data.candidates[0].content.parts.map(function(p){ return p.text || ""; }).join("");
  }

  const cleaned = text.replace(/```json|```/g, "").trim();
  return JSON.parse(cleaned);
}

function ImageSlot({ title, subtitle, image, onSelect, status }) {
  const inputRef = useRef(null);

  return (
    <div className="slot">
      <div className="slot-head">
        <span className="slot-index">{title}</span>
        <span className="slot-subtitle">{subtitle}</span>
      </div>

      <div
        className={"slot-drop" + (image ? " has-image" : "")}
        onClick={() => inputRef.current && inputRef.current.click()}
      >
        {image ? (
          <img src={image} alt={subtitle} />
        ) : (
          <div className="slot-empty">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
              <path
                d="M4 16V4h16v12M4 16l4-4 3 3 5-5 4 4M4 16v4h16v-4"
                stroke="currentColor"
                strokeWidth="1.5"
                strokeLinecap="round"
                strokeLinejoin="round"
              />
            </svg>
            <span>Bấm để chọn ảnh</span>
          </div>
        )}

        {status === "reading" && (
          <div className="slot-overlay">
            <div className="spinner"></div>
            <span>Đang đọc dữ liệu...</span>
          </div>
        )}
      </div>

      <input
        ref={inputRef}
        type="file"
        accept="image/*"
        style={{ display: "none" }}
        onChange={(e) => {
          const file = e.target.files && e.target.files[0];
          if (file) onSelect(file);
        }}
      />
    </div>
  );
}

function App() {
  const [apiKey, setApiKey] = useState(function () {
    try {
      return localStorage.getItem(STORAGE_KEY) || "";
    } catch (e) {
      return "";
    }
  });
  const [editingKey, setEditingKey] = useState(false);
  const [imageA, setImageA] = useState(null);
  const [imageB, setImageB] = useState(null);
  const [dataA, setDataA] = useState(null);
  const [dataB, setDataB] = useState(null);
  const [statusA, setStatusA] = useState("idle");
  const [statusB, setStatusB] = useState("idle");
  const [error, setError] = useState("");

  const apiKeyReady = apiKey && apiKey.trim().length > 10;

  function saveApiKey(value) {
    setApiKey(value);
    try {
      if (value && value.trim().length > 10) {
        localStorage.setItem(STORAGE_KEY, value.trim());
      } else {
        localStorage.removeItem(STORAGE_KEY);
      }
    } catch (e) {
      // localStorage không khả dụng (vd. chế độ ẩn danh) -> bỏ qua, key vẫn dùng được trong session này
    }
  }

  function clearApiKey() {
    setApiKey("");
    setEditingKey(true);
    try {
      localStorage.removeItem(STORAGE_KEY);
    } catch (e) {}
  }

  async function handleSelect(file, slot) {
    if (!apiKeyReady) {
      setError("Chưa nhập API key Gemini hợp lệ. Vào aistudio.google.com/apikey để lấy key.");
      return;
    }

    setError("");
    const setImage = slot === "A" ? setImageA : setImageB;
    const setData = slot === "A" ? setDataA : setDataB;
    const setStatus = slot === "A" ? setStatusA : setStatusB;

    const previewUrl = URL.createObjectURL(file);
    setImage(previewUrl);
    setData(null);
    setStatus("reading");

    try {
      const base64 = await fileToBase64(file);
      const fields = await extractFields(base64, file.type || "image/jpeg", apiKey.trim());
      setData(fields);
      setStatus("done");
    } catch (err) {
      console.error(err);
      setStatus("error");
      setError(
        "Không đọc được dữ liệu từ ảnh này. " + (err.message || "Thử lại với ảnh rõ hơn hoặc chụp thẳng góc.")
      );
    }
  }

  const bothReady = dataA && dataB;

  const comparisons = bothReady
    ? Object.keys(FIELD_LABELS).map((key) => {
        const a = dataA[key];
        const b = dataB[key];
        const match = a && b && normalizeForCompare(a) === normalizeForCompare(b);
        return { key, label: FIELD_LABELS[key], a, b, match };
      })
    : [];

  const allMatch = comparisons.length > 0 && comparisons.every((c) => c.match);
  const anyMissing =
    bothReady && Object.keys(FIELD_LABELS).some((k) => !dataA[k] || !dataB[k]);

  function reset() {
    setImageA(null);
    setImageB(null);
    setDataA(null);
    setDataB(null);
    setStatusA("idle");
    setStatusB("idle");
    setError("");
  }

  return (
    <div className="page">
      <div className="header">
        <div className="header-top">
          <div>
            <div className="header-eyebrow">Quầy thủ tục · Đối chiếu giấy tờ</div>
            <h1>TACC ⇄ VISA CHECK</h1>
            <div className="header-sub">
              Đọc và so khớp Họ tên, Ngày sinh, Số hộ chiếu, Giới tính giữa hai giấy tờ.
            </div>
          </div>
          <div className="gate-id">GATE · MANUAL REVIEW</div>
        </div>
        <div className="disclaimer">
          <b>Lưu ý:</b> công cụ chỉ đối chiếu dữ liệu đọc được trên hai ảnh, không xác minh tính xác thực hay hiệu lực pháp lý của giấy tờ. Quyết định cuối cùng thuộc về nhân viên thực hiện thủ tục.
        </div>
      </div>

      <div className="main">

        <div className="api-key-box">
          <label>Gemini API Key:</label>
          {(!apiKeyReady || editingKey) ? (
            <React.Fragment>
              <input
                type="password"
                value={apiKey}
                onChange={(e) => saveApiKey(e.target.value)}
                placeholder="AQ.Ab8RN6JnrViLWJX-KJR85NgaVt6JjV563lJBxFVcLzV6vJlyUQ"
                autoFocus={editingKey}
              />
              <span className={"api-key-status " + (apiKeyReady ? "ok" : "no")}>
                {apiKeyReady ? "● Đã lưu" : "○ Chưa có key"}
              </span>
              {apiKeyReady && (
                <button className="btn-key-action" onClick={() => setEditingKey(false)}>
                  Xong
                </button>
              )}
            </React.Fragment>
          ) : (
            <React.Fragment>
              <span className="api-key-status ok" style={{ flex: 1 }}>
                ● Đã lưu trên máy này — không cần nhập lại
              </span>
              <button className="btn-key-action" onClick={() => setEditingKey(true)}>
                Đổi key
              </button>
              <button className="btn-key-action danger" onClick={clearApiKey}>
                Xoá key
              </button>
            </React.Fragment>
          )}
        </div>

        <div className="slots">
          <ImageSlot
            title="01"
            subtitle="TACC Đài Loan"
            image={imageA}
            status={statusA}
            onSelect={(f) => handleSelect(f, "A")}
          />
          <ImageSlot
            title="02"
            subtitle="Visa (US / Schengen / khác)"
            image={imageB}
            status={statusB}
            onSelect={(f) => handleSelect(f, "B")}
          />
        </div>

        {error && <div className="error-box">{error}</div>}

        {bothReady && (
          <React.Fragment>
            <div className="compare-table">
              <div className="compare-row head">
                <div className="compare-cell label">Trường</div>
                <div className="compare-cell value">TACC</div>
                <div className="compare-cell value">Visa</div>
                <div className="compare-cell flag"></div>
              </div>
              {comparisons.map((c) => (
                <div className="compare-row" key={c.key}>
                  <div className="compare-cell label">{c.label}</div>
                  <div className={"compare-cell value" + (!c.a ? " empty" : "")}>
                    {c.a || "Không đọc được"}
                  </div>
                  <div className={"compare-cell value" + (!c.b ? " empty" : "")}>
                    {c.b || "Không đọc được"}
                  </div>
                  <div className="compare-cell flag">
                    <div className={"match-dot " + (c.match ? "ok" : "no")}></div>
                  </div>
                </div>
              ))}
            </div>

            {anyMissing ? (
              <div className="verdict no">
                <div className="verdict-icon">!</div>
                <div className="verdict-text">
                  <h2>THIẾU DỮ LIỆU — KHÔNG ĐỦ CƠ SỞ ĐỐI CHIẾU</h2>
                  <p>Một số trường không đọc được từ ảnh. Vui lòng chụp lại rõ hơn hoặc kiểm tra thủ công.</p>
                </div>
              </div>
            ) : allMatch ? (
              <div className="verdict ok">
                <div className="verdict-icon">✓</div>
                <div className="verdict-text">
                  <h2>HỢP LỆ — DỮ LIỆU KHỚP</h2>
                  <p>Toàn bộ 4 trường thông tin khớp giữa hai giấy tờ.</p>
                </div>
              </div>
            ) : (
              <div className="verdict no">
                <div className="verdict-icon">✕</div>
                <div className="verdict-text">
                  <h2>KHÔNG HỢP LỆ — DỮ LIỆU KHÔNG KHỚP</h2>
                  <p>Có ít nhất một trường không khớp giữa hai giấy tờ. Vui lòng kiểm tra lại thủ công.</p>
                </div>
              </div>
            )}
          </React.Fragment>
        )}

        <div className="actions">
          <button className="btn-reset" onClick={reset}>
            ⟲ Làm lại từ đầu
          </button>
        </div>
      </div>

      <div className="footer-note">
        Kết quả do AI đọc tự động, có thể sai sót với ảnh mờ/nghiêng/lóa sáng.
        Luôn xác minh lại bằng mắt trước khi đưa ra quyết định cuối cùng.
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>

</body>
</html>
