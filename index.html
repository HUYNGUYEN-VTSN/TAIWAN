<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VISA MATCH PRO</title>

  <style>
    body{
      margin:0;
      font-family:system-ui;
      background:#0b1220;
      color:#e8eefc;
    }

    .wrap{
      max-width:900px;
      margin:auto;
      padding:16px;
    }

    h1{
      text-align:center;
      margin:10px 0 0;
      font-size:22px;
      color:#4da3ff;
    }

    .sub{
      text-align:center;
      font-size:12px;
      opacity:.7;
      margin-bottom:20px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    .card{
      background:#111a2e;
      border:1px solid #22304f;
      border-radius:12px;
      padding:12px;
    }

    input{
      display:none;
    }

    .btn{
      width:100%;
      padding:14px;
      border-radius:10px;
      background:#1f6fff;
      border:none;
      color:white;
      font-weight:600;
      font-size:14px;
    }

    img{
      width:100%;
      border-radius:10px;
      margin-top:10px;
    }

    .result{
      margin-top:12px;
      padding:12px;
      border-radius:10px;
      background:#0f1a33;
      border:1px solid #22304f;
      font-size:13px;
      white-space:pre-wrap;
    }

    .ok{color:#00e676;font-weight:bold;}
    .bad{color:#ff5252;font-weight:bold;}

    .loading{
      text-align:center;
      font-size:13px;
      opacity:.8;
    }
  </style>
</head>

<body>
<div class="wrap">
  <h1>VISA MATCH PRO</h1>
  <div class="sub">TACC • VISA • PASSPORT CHECK</div>

  <div class="grid">

    <div class="card">
      <button class="btn" onclick="openCam('a')">📷 CHỤP / CHỌN TACC</button>
      <input type="file" accept="image/*" capture="environment" id="fileA">
      <img id="imgA"/>
    </div>

    <div class="card">
      <button class="btn" onclick="openCam('b')">📷 CHỤP / CHỌN VISA</button>
      <input type="file" accept="image/*" capture="environment" id="fileB">
      <img id="imgB"/>
    </div>

    <button class="btn" onclick="process()">⚡ SO SÁNH</button>

    <div class="card">
      <div id="status" class="loading">Chờ upload ảnh...</div>
      <div id="output" class="result"></div>
    </div>

  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxnQHhKOPckxsZ5BYELPCuGLgRzv1UxXt_WEIQq93Nwhn-TExnwfvkyugBkbar1cB-x/exec";
const SECRET_TOKEN = "";

let dataA = null;
let dataB = null;

function openCam(type){
  document.getElementById(type === 'a' ? 'fileA' : 'fileB').click();
}

function toBase64(file){
  return new Promise(res=>{
    const r = new FileReader();
    r.onload = () => res(r.result.split(",")[1]);
    r.readAsDataURL(file);
  });
}

async function handleFile(file, type){
  const img = document.getElementById(type === 'a' ? 'imgA' : 'imgB');
  img.src = URL.createObjectURL(file);

  document.getElementById("status").innerText = "Đang đọc ảnh...";

  const base64 = await toBase64(file);

  const res = await fetch(SCRIPT_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      base64,
      mimeType:file.type,
      token:SECRET_TOKEN,
      prompt:`Extract JSON: name,dob,passport,gender`
    })
  });

  const json = await res.json();
  const text = json.candidates?.[0]?.content?.parts?.[0]?.text || "{}";

  try{
    return JSON.parse(text.replace(/```/g,""));
  }catch(e){
    return {};
  }
}

document.getElementById("fileA").onchange = async e=>{
  dataA = await handleFile(e.target.files[0],"a");
};

document.getElementById("fileB").onchange = async e=>{
  dataB = await handleFile(e.target.files[0],"b");
};

function cmp(a,b){
  return (a||"").toString().trim().toLowerCase() === (b||"").toString().trim().toLowerCase();
}

function process(){
  if(!dataA || !dataB){
    alert("Thiếu dữ liệu!");
    return;
  }

  let r = "";

  function line(label,a,b){
    const ok = cmp(a,b);
    return `${label}: ${ok ? "OK" : "FAIL"}\nA: ${a}\nB: ${b}\n\n`;
  }

  r += line("NAME",dataA.name,dataB.name);
  r += line("DOB",dataA.dob,dataB.dob);
  r += line("PASSPORT",dataA.passport,dataB.passport);
  r += line("GENDER",dataA.gender,dataB.gender);

  const allOk =
    cmp(dataA.name,dataB.name) &&
    cmp(dataA.dob,dataB.dob) &&
    cmp(dataA.passport,dataB.passport) &&
    cmp(dataA.gender,dataB.gender);

  r += "\n====================\n";
  r += allOk ? "🟢 PASS" : "🔴 FAIL";

  document.getElementById("output").innerText = r;
  document.getElementById("status").innerHTML =
    allOk ? "<span class='ok'>MATCH OK</span>" : "<span class='bad'>MISMATCH</span>";
}
</script>

</body>
</html>
