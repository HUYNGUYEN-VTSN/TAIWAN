<script type="text/babel" data-presets="react">

const { useState, useRef } = React;

// =====================================================================
// CẤU HÌNH PROXY — web này KHÔNG gọi trực tiếp Gemini API nữa.
// Web gọi qua một Google Apps Script làm trung gian, API key Gemini
// được giữ an toàn bên trong Apps Script (Script Properties),
// không xuất hiện ở bất kỳ đâu trong code web này.
//
// Cách lấy URL: deploy file gemini-proxy.gs thành Web App,
// copy URL dạng https://script.google.com/macros/s/XXXX/exec
// và dán vào đây.
// =====================================================================
const PROXY_URL = "https://script.google.com/macros/s/AKfycbxnQHhKOPckxsZ5BYELPCuGLgRzv1UxXt_WEIQq93Nwhn-TExnwfvkyugBkbar1cB-x/exec";

const GEMINI_MODEL = "gemini-2.5-flash-lite";

const FIELD_LABELS = {
  name: "Họ tên",
  dob: "Ngày sinh",
  passport: "Số hộ chiếu",
  gender: "Giới tính",
  usaVisaNumber: "Số Visa Mỹ",
};

function normalizeForCompare(value) {
  if (!value) return "";
  return value.toString().trim().toUpperCase().replace(/\s+/g, " ");
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// Đọc EXIF Orientation từ file ảnh JPEG (camera điện thoại luôn gắn cờ
// này khi chụp xoay máy). Trả về số 1-8 theo chuẩn EXIF, hoặc 1 (mặc
// định, không xoay) nếu không tìm thấy / không phải JPEG / lỗi đọc.
function getExifOrientation(file) {
  return new Promise((resolve) => {
    if (!file || file.type !== "image/jpeg") {
      resolve(1);
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const view = new DataView(e.target.result);
        if (view.getUint16(0, false) !== 0xffd8) {
          resolve(1);
          return;
        }
        const length = view.byteLength;
        let offset = 2;
        while (offset < length) {
          const marker = view.getUint16(offset, false);
          offset += 2;
          if (marker === 0xffe1) {
            if (view.getUint32(offset + 2, false) !== 0x45786966) {
              resolve(1);
              return;
            }
            const little = view.getUint16(offset + 8, false) === 0x4949;
            const tiffOffset = offset + 8;
            const firstIFDOffset = view.getUint32(tiffOffset + 4, little);
            const dirOffset = tiffOffset + firstIFDOffset;
            const tagsCount = view.getUint16(dirOffset, little);
            for (let i = 0; i < tagsCount; i++) {
              const entryOffset = dirOffset + 2 + i * 12;
              const tag = view.getUint16(entryOffset, little);
              if (tag === 0x0112) {
                resolve(view.getUint16(entryOffset + 8, little));
                return;
              }
            }
            resolve(1);
            return;
          } else if ((marker & 0xff00) !== 0xff00) {
            break;
          } else {
            offset += view.getUint16(offset, false);
          }
        }
        resolve(1);
      } catch (err) {
        resolve(1);
      }
    };
    reader.onerror = () => resolve(1);
    // Chỉ cần đọc 128KB đầu là đủ tìm EXIF, không cần đọc cả file
    reader.readAsArrayBuffer(file.slice(0, 131072));
  });
}

// Thu nhỏ ảnh trước khi gửi cho Gemini để tăng tốc upload + xử lý,
// đồng thời XOAY ẢNH ĐÚNG CHIỀU theo EXIF Orientation trước khi vẽ
// vào canvas — bắt buộc phải làm vì canvas KHÔNG tự đọc cờ xoay này.
// Ảnh chụp trực tiếp từ camera điện thoại hầu như luôn có cờ EXIF
// (ví dụ orientation=6 khi chụp đứng), nếu bỏ qua bước này thì ảnh
// gửi cho Gemini sẽ bị xoay sai góc -> đọc chữ thất bại, dù trên máy
// (ảnh chọn từ thư mục, ít khi có cờ lạ) vẫn chạy bình thường.
// Giữ cạnh dài nhất tối đa maxDimension px, nén JPEG chất lượng 0.92.
// Nếu canvas lỗi vì lý do nào đó (vd. ảnh hỏng), fallback về ảnh gốc,
// không chặn luồng chính.
async function resizeImageToBase64(file, maxDimension) {
  const orientation = await getExifOrientation(file);

  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);

    img.onload = () => {
      try {
        const srcW = img.width;
        const srcH = img.height;

        // Với orientation 5-8, ảnh gốc bị xoay 90°/270° nên chiều
        // rộng/cao thực tế sau khi xoay sẽ đảo ngược so với pixel gốc.
        const swapDimensions = orientation >= 5 && orientation <= 8;
        let outW = swapDimensions ? srcH : srcW;
        let outH = swapDimensions ? srcW : srcH;

        const longest = Math.max(outW, outH);
        if (longest > maxDimension) {
          const scale = maxDimension / longest;
          outW = Math.round(outW * scale);
          outH = Math.round(outH * scale);
        }

        const canvas = document.createElement("canvas");
        canvas.width = outW;
        canvas.height = outH;
        const ctx = canvas.getContext("2d");

        // Kích thước cần vẽ ảnh gốc vào (trước khi áp biến đổi xoay),
        // để sau khi xoay sẽ lấp đúng khung outW x outH.
        const drawW = swapDimensions ? outH : outW;
        const drawH = swapDimensions ? outW : outH;

        switch (orientation) {
          case 2: // lật ngang
            ctx.translate(outW, 0);
            ctx.scale(-1, 1);
            break;
          case 3: // xoay 180°
            ctx.translate(outW, outH);
            ctx.rotate(Math.PI);
            break;
          case 4: // lật dọc
            ctx.translate(0, outH);
            ctx.scale(1, -1);
            break;
          case 5: // lật ngang + xoay 90° CW
            ctx.rotate(0.5 * Math.PI);
            ctx.scale(1, -1);
            break;
          case 6: // xoay 90° CW (phổ biến nhất khi chụp đứng bằng điện thoại)
            ctx.rotate(0.5 * Math.PI);
            ctx.translate(0, -outW);
            break;
          case 7: // lật ngang + xoay 270° CW
            ctx.rotate(-0.5 * Math.PI);
            ctx.translate(-outH, 0);
            ctx.scale(1, -1);
            break;
          case 8: // xoay 270° CW
            ctx.rotate(-0.5 * Math.PI);
            ctx.translate(-outH, 0);
            break;
          default:
            // orientation 1 hoặc không xác định -> không cần biến đổi
            break;
        }

        ctx.drawImage(img, 0, 0, drawW, drawH);

        const dataUrl = canvas.toDataURL("image/jpeg", 0.92);
        URL.revokeObjectURL(url);
        resolve({ base64: dataUrl.split(",")[1], mimeType: "image/jpeg" });
      } catch (e) {
        URL.revokeObjectURL(url);
        reject(e);
      }
    };

    img.onerror = (e) => {
      URL.revokeObjectURL(url);
      reject(e);
    };

    img.src = url;
  });
}

const MAX_UPLOAD_DIMENSION = 2200;

async function prepareImageForUpload(file) {
  try {
    return await resizeImageToBase64(file, MAX_UPLOAD_DIMENSION);
  } catch (e) {
    // Resize lỗi (hiếm) -> dùng ảnh gốc để không chặn người dùng
    const base64 = await fileToBase64(file);
    return { base64, mimeType: file.type || "image/jpeg" };
  }
}

function sleep(ms) {
  return new Promise((resolve) => setTimeout(resolve, ms));
}

async function callProxyOnce(base64, mimeType, prompt) {
  const response = await fetch(PROXY_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain;charset=utf-8",
    },
    body: JSON.stringify({
      base64: base64,
      mimeType: mimeType,
      prompt: prompt,
      model: GEMINI_MODEL,
    }),
  });

  if (!response.ok) {
    const errText = await response.text();
    const err = new Error("Lỗi proxy (" + response.status + "): " + errText.slice(0, 200));
    err.status = response.status;
    throw err;
  }

  const data = await response.json();

  if (data && data.error) {
    const err = new Error(data.error);
    err.status = data._status || null;
    throw err;
  }

  return data;
}

async function extractFields(base64, mimeType) {
  const prompt = `Đây là ảnh giấy tờ tùy thân, có thể là: Thẻ tạm trú Đài Loan (TAC), giấy "Travel Authorization Certificate" của Đài Loan cấp cho người Việt có visa Mỹ, hoặc visa nhập cảnh thật (Mỹ, khối Schengen...).

Đọc kỹ ảnh và trích xuất thông tin sau, ở dạng JSON object, KHÔNG kèm bất kỳ chữ nào khác ngoài JSON, không dùng markdown code block:
{
  "name": "họ tên đầy đủ, viết hoa, đúng như trên giấy tờ",
  "dob": "ngày sinh, định dạng DD/MM/YYYY",
  "passport": "số hộ chiếu (passport number), viết hoa không khoảng trắng",
  "gender": "M hoặc F (Male/Female, Nam/Nữ quy về M/F)",
  "usaVisaNumber": "số visa Mỹ (US visa number/foil number), thường gồm 1 chữ cái + 7 chữ số (ví dụ N2047039, M1875390). QUAN TRỌNG: trên giấy 'Travel Authorization Certificate' của Đài Loan, dòng nhãn 'Holding a Vietnam passport with USA visa:' thường KHÔNG có số ngay sau dấu hai chấm trên cùng dòng — số đó thường nằm RIÊNG Ở MỘT VỊ TRÍ KHÁC trong khung, thường là góc dưới bên phải của khung chứng nhận, có thể nằm đè lên hoặc gần con dấu tròn lớn của cơ quan cấp giấy, đôi khi cách xa dòng nhãn vài dòng. Phải quét kỹ toàn bộ khung giấy tờ (đặc biệt vùng giữa và góc dưới phải) để tìm đúng số này, không chỉ nhìn ngay sau dấu hai chấm. Nếu ảnh là visa Mỹ thật (không phải giấy của Đài Loan) thì lấy số visa in trực tiếp trên visa đó. Nếu giấy tờ không liên quan tới visa Mỹ và không tìm thấy số này thì để null.",
  "cancelled": "true nếu trên giấy tờ có in/đóng dấu/viết tay chữ CANCEL, CANCELED, CANCELLED, VOID, ANNULÉ hoặc dấu hiệu huỷ visa tương đương ở bất kỳ đâu trên ảnh; false nếu không thấy"
}

Nếu không đọc được một trường nào, để giá trị là null cho trường đó (trừ "cancelled" luôn phải là true hoặc false). Chỉ trả về JSON object thuần, không kèm bất kỳ văn bản nào khác.`;

  if (!PROXY_URL || PROXY_URL.indexOf("DÁN_URL") !== -1) {
    throw new Error("Chưa cấu hình PROXY_URL trong code. Xem hướng dẫn deploy gemini-proxy.gs.");
  }

  // Tự động thử lại khi gặp lỗi 429 (hết quota tạm thời / gọi quá nhanh).
  // Đợi 4s rồi thử lại, tối đa 3 lần — đủ để vượt qua giới hạn request/phút
  // mà không bắt người dùng phải tự bấm lại.
  const MAX_RETRIES = 3;
  const RETRY_DELAY_MS = 4000;

  let lastErr = null;
  for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
    try {
      const data = await callProxyOnce(base64, mimeType, prompt);

      let text = "";
      if (data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts) {
        text = data.candidates[0].content.parts.map(function(p){ return p.text || ""; }).join("");
      }

      let cleaned = text.replace(/```json|```/g, "").trim();

      // Phòng trường hợp Gemini lỡ thêm chữ giải thích trước/sau JSON
      // -> chỉ lấy phần từ dấu { đầu tới dấu } cuối cùng.
      const firstBrace = cleaned.indexOf("{");
      const lastBrace = cleaned.lastIndexOf("}");
      if (firstBrace !== -1 && lastBrace !== -1 && lastBrace > firstBrace) {
        cleaned = cleaned.slice(firstBrace, lastBrace + 1);
      }

      let parsed;
      try {
        parsed = JSON.parse(cleaned);
      } catch (parseErr) {
        const snippet = cleaned.slice(0, 160).replace(/\s+/g, " ");
        throw new Error(
          "AI trả về dữ liệu không đúng định dạng (có thể do ảnh quá mờ/nghiêng để đọc). Phản hồi: \"" +
            snippet +
            (cleaned.length > 160 ? "..." : "") +
            "\""
        );
      }

      // Chuẩn hoá "cancelled" về boolean thật, vì Gemini có thể trả về
      // true/false (boolean) hoặc "true"/"false" (string) tuỳ lần.
      parsed.cancelled = parsed.cancelled === true || String(parsed.cancelled).toLowerCase() === "true";

      return parsed;
    } catch (err) {
      lastErr = err;
      const is429 = err.status === 429 || /429|quota|RESOURCE_EXHAUSTED/i.test(err.message || "");
      const isLastAttempt = attempt === MAX_RETRIES;

      if (!is429 || isLastAttempt) {
        if (is429) {
          throw new Error(
            "Đã hết lượt gọi AI trong khoảng thời gian này (quota). Vui lòng đợi khoảng 1 phút rồi thử lại, hoặc liên hệ người quản trị nếu lỗi này lặp lại nhiều lần."
          );
        }
        throw err;
      }

      // Gặp 429 và còn lượt thử -> đợi rồi thử lại, không cần người dùng làm gì
      await sleep(RETRY_DELAY_MS);
    }
  }

  throw lastErr;
}

function ImageSlot({ title, subtitle, image, onSelect, status }) {
  const fileInputRef = useRef(null);
  const cameraInputRef = useRef(null);
  const [showMenu, setShowMenu] = useState(false);
  const [pendingPreview, setPendingPreview] = useState(null); // { file, url } đang chờ xác nhận

  function openMenu(e) {
    e.stopPropagation();
    setShowMenu(true);
  }

  function handlePicked(file) {
    setShowMenu(false);
    if (!file) return;
    const url = URL.createObjectURL(file);
    setPendingPreview({ file, url });
  }

  function confirmPending() {
    if (!pendingPreview) return;
    onSelect(pendingPreview.file);
    setPendingPreview(null);
  }

  function retakePending() {
    if (pendingPreview) URL.revokeObjectURL(pendingPreview.url);
    setPendingPreview(null);
    setShowMenu(true);
  }

  return (
    <div className="slot">
      <div className="slot-head">
        <span className="slot-index">{title}</span>
        <span className="slot-subtitle">{subtitle}</span>
      </div>

      <div
        className={"slot-drop" + (image ? " has-image" : "")}
        onClick={openMenu}
      >
        {image ? (
          <img src={image} alt={subtitle} />
        ) : (
          <div className="slot-empty">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
              <path
                d="M4 16V4h16v12M4 16l4-4 3 3 5-5 4 4M4 16v4h16v-4"
                stroke="currentColor"
                strokeWidth="1.5"
                strokeLinecap="round"
                strokeLinejoin="round"
              />
            </svg>
            <span>Bấm để chọn ảnh</span>
          </div>
        )}

        {status === "reading" && (
          <div className="slot-overlay">
            <div className="spinner"></div>
            <span>Đang đọc dữ liệu...</span>
          </div>
        )}

        {showMenu && (
          <div className="slot-source-menu" onClick={(e) => e.stopPropagation()}>
            <button
              className="slot-source-btn"
              onClick={() => cameraInputRef.current && cameraInputRef.current.click()}
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M4 8h3l1.5-2h7L17 8h3a1 1 0 011 1v10a1 1 0 01-1 1H4a1 1 0 01-1-1V9a1 1 0 011-1z" stroke="currentColor" strokeWidth="1.6" strokeLinejoin="round"/>
                <circle cx="12" cy="14" r="3.2" stroke="currentColor" strokeWidth="1.6"/>
              </svg>
              Chụp ảnh
            </button>
            <button
              className="slot-source-btn"
              onClick={() => fileInputRef.current && fileInputRef.current.click()}
            >
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M4 16V4h16v12M4 16l4-4 3 3 5-5 4 4M4 16v4h16v-4" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
              Chọn từ máy
            </button>
            <button className="slot-source-cancel" onClick={() => setShowMenu(false)}>Huỷ</button>
          </div>
        )}

        {pendingPreview && (
          <div className="slot-preview-overlay" onClick={(e) => e.stopPropagation()}>
            <img src={pendingPreview.url} alt="preview" />
            <div className="slot-preview-actions">
              <button className="slot-preview-btn retake" onClick={retakePending}>↺ Chụp lại</button>
              <button className="slot-preview-btn confirm" onClick={confirmPending}>✓ Dùng ảnh này</button>
            </div>
          </div>
        )}
      </div>

      <input
        ref={fileInputRef}
        type="file"
        accept="image/*"
        style={{ display: "none" }}
        onChange={(e) => {
          const file = e.target.files && e.target.files[0];
          handlePicked(file);
          e.target.value = "";
        }}
      />

      <input
        ref={cameraInputRef}
        type="file"
        accept="image/*"
        capture="environment"
        style={{ display: "none" }}
        onChange={(e) => {
          const file = e.target.files && e.target.files[0];
          handlePicked(file);
          e.target.value = "";
        }}
      />
    </div>
  );
}

function App() {
  const [imageA, setImageA] = useState(null);
  const [imageB, setImageB] = useState(null);
  const [dataA, setDataA] = useState(null);
  const [dataB, setDataB] = useState(null);
  const [statusA, setStatusA] = useState("idle");
  const [statusB, setStatusB] = useState("idle");
  const [error, setError] = useState("");

  async function handleSelect(file, slot) {
    setError("");
    const setImage = slot === "A" ? setImageA : setImageB;
    const setData = slot === "A" ? setDataA : setDataB;
    const setStatus = slot === "A" ? setStatusA : setStatusB;

    const previewUrl = URL.createObjectURL(file);
    setImage(previewUrl);
    setData(null);
    setStatus("reading");

    try {
      const { base64, mimeType } = await prepareImageForUpload(file);
      const fields = await extractFields(base64, mimeType);
      setData(fields);
      setStatus("done");
    } catch (err) {
      console.error(err);
      setStatus("error");
      setError(
        "Không đọc được dữ liệu từ ảnh này. " + (err.message || "Thử lại với ảnh rõ hơn hoặc chụp thẳng góc.")
      );
    }
  }

  const bothReady = dataA && dataB;

  const cancelledSide =
    (dataA && dataA.cancelled ? "A" : null) || (dataB && dataB.cancelled ? "B" : null);
  const isCancelled = bothReady && (Boolean(dataA && dataA.cancelled) || Boolean(dataB && dataB.cancelled));

  // Các trường "tuỳ chọn": chỉ đưa vào so khớp/tính thiếu dữ liệu khi
  // ít nhất 1 trong 2 ảnh có đọc ra giá trị (vd. không phải giấy tờ nào
  // cũng có số Visa Mỹ, TAC thường thì không có).
  const OPTIONAL_FIELDS = ["usaVisaNumber"];

  const activeFieldKeys = bothReady
    ? Object.keys(FIELD_LABELS).filter((key) => {
        if (!OPTIONAL_FIELDS.includes(key)) return true;
        return Boolean(dataA[key]) || Boolean(dataB[key]);
      })
    : [];

  const comparisons = bothReady
    ? activeFieldKeys.map((key) => {
        const a = dataA[key];
        const b = dataB[key];
        const match = a && b && normalizeForCompare(a) === normalizeForCompare(b);
        return { key, label: FIELD_LABELS[key], a, b, match };
      })
    : [];

  const allMatch = comparisons.length > 0 && comparisons.every((c) => c.match);
  const anyMissing =
    bothReady && activeFieldKeys.some((k) => !dataA[k] || !dataB[k]);

  function reset() {
    setImageA(null);
    setImageB(null);
    setDataA(null);
    setDataB(null);
    setStatusA("idle");
    setStatusB("idle");
    setError("");
  }

  return (
    <div className="page">
      <div className="header">
        <div className="title-card">
          <div className="title-icon">✅</div>
          <h1>KIỂM TRA TAC ĐÀI LOAN</h1>
        </div>
      </div>

      <div className="main">

        <div className="slots">
          <ImageSlot
            title="01"
            subtitle="TAC Đài Loan"
            image={imageA}
            status={statusA}
            onSelect={(f) => handleSelect(f, "A")}
          />
          <ImageSlot
            title="02"
            subtitle="Visa (US / Schengen / khác)"
            image={imageB}
            status={statusB}
            onSelect={(f) => handleSelect(f, "B")}
          />
        </div>

        {error && <div className="error-box">{error}</div>}

        {bothReady && (
          <React.Fragment>
            <div className="compare-table">
              <div className="compare-row head">
                <div className="compare-cell label">Loại giấy tờ</div>
                <div className="compare-cell value">TAC</div>
                <div className="compare-cell value">Visa</div>
                <div className="compare-cell flag"></div>
              </div>
              {comparisons.map((c) => (
                <div className="compare-row" key={c.key}>
                  <div className="compare-cell label">{c.label}</div>
                  <div className={"compare-cell value" + (!c.a ? " empty" : "")}>
                    {c.a || "Không đọc được"}
                  </div>
                  <div className={"compare-cell value" + (!c.b ? " empty" : "")}>
                    {c.b || "Không đọc được"}
                  </div>
                  <div className="compare-cell flag">
                    <div className={"match-dot " + (c.match ? "ok" : "no")}></div>
                  </div>
                </div>
              ))}
            </div>

            {isCancelled ? (
              <div className="verdict no">
                <div className="verdict-icon">✕</div>
                <div className="verdict-text">
                  <h2>KHÔNG HỢP LỆ</h2>
                  <p>
                    Lý do: Visa đã bị huỷ (phát hiện dấu CANCEL/CANCELED/CANCELLED trên giấy tờ{" "}
                    {cancelledSide === "A" ? "TAC, ảnh 01" : "Visa, ảnh 02"}). Vui lòng kiểm tra lại thủ công trước khi cho qua.
                  </p>
                </div>
              </div>
            ) : anyMissing ? (
              <div className="verdict no">
                <div className="verdict-icon">!</div>
                <div className="verdict-text">
                  <h2>KHÔNG HỢP LỆ</h2>
                  <p>
                    Lý do: thiếu dữ liệu —{" "}
                    {activeFieldKeys
                      .filter((k) => !dataA[k] || !dataB[k])
                      .map((k) => FIELD_LABELS[k])
                      .join(", ")}{" "}
                    không đọc được từ ảnh. Vui lòng chụp lại rõ hơn hoặc kiểm tra thủ công.
                  </p>
                </div>
              </div>
            ) : allMatch ? (
              <div className="verdict ok">
                <div className="verdict-icon">✓</div>
                <div className="verdict-text">
                  <h2>HỢP LỆ — DỮ LIỆU KHỚP</h2>
                  <p>Toàn bộ 4 trường thông tin khớp giữa hai giấy tờ.</p>
                </div>
              </div>
            ) : (
              <div className="verdict no">
                <div className="verdict-icon">✕</div>
                <div className="verdict-text">
                  <h2>KHÔNG HỢP LỆ</h2>
                  <p>
                    Lý do:{" "}
                    {comparisons
                      .filter((c) => !c.match)
                      .map((c) => c.label)
                      .join(", ")}{" "}
                    không khớp giữa hai giấy tờ. Vui lòng kiểm tra lại thủ công.
                  </p>
                </div>
              </div>
            )}
          </React.Fragment>
        )}

        <div className="actions">
          <button className="btn-reset" onClick={reset}>
            ⟲ Làm lại từ đầu
          </button>
        </div>
      </div>

      <div className="footer-note">
        Kết quả do AI đọc tự động, có thể sai sót với ảnh mờ/nghiêng/lóa sáng.
        Luôn xác minh lại bằng mắt trước khi đưa ra quyết định cuối cùng.
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
