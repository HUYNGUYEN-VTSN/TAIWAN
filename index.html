<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VISA MATCH PRO</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b1220;
  color:#e8eefc;
}

.wrap{max-width:900px;margin:auto;padding:16px}

h1{text-align:center;color:#4da3ff;margin:10px 0}

.sub{text-align:center;opacity:.7;font-size:12px}

.card{
  background:#111a2e;
  border:1px solid #22304f;
  border-radius:12px;
  padding:12px;
  margin-top:12px;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#1f6fff;
  color:#fff;
  font-weight:600;
}

img{width:100%;border-radius:10px;margin-top:10px}

.status{
  text-align:center;
  font-size:13px;
  margin-top:10px;
}

.ok{color:#00e676;font-weight:bold}
.bad{color:#ff5252;font-weight:bold}
.warn{color:#ffb74d;font-weight:bold}
</style>
</head>

<body>
<div class="wrap">

<h1>VISA MATCH PRO</h1>
<div class="sub">TAC • VISA • AI CHECK</div>

<div class="card">
<button class="btn" onclick="fileA.click()">📷 CHỤP TAC</button>
<input type="file" id="fileA" accept="image/*" capture="environment">
<img id="imgA">
<div id="stA" class="status">Chưa xử lý</div>
</div>

<div class="card">
<button class="btn" onclick="fileB.click()">📷 CHỤP VISA</button>
<input type="file" id="fileB" accept="image/*" capture="environment">
<img id="imgB">
<div id="stB" class="status">Chưa xử lý</div>
</div>

<button class="btn" onclick="compare()">⚡ SO SÁNH</button>

<div class="card">
<div id="out"></div>
</div>

</div>

<script>
const SCRIPT_URL = "YOUR_GOOGLE_SCRIPT_URL";
const SECRET_TOKEN = "";

let dataA = null;
let dataB = null;
let doneA = false;
let doneB = false;

function toBase64(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(",")[1]);
    r.readAsDataURL(file);
  });
}

async function callAI(base64,mime,type){

  const res = await fetch(SCRIPT_URL,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      base64,
      mimeType:mime,
      token:SECRET_TOKEN,
      prompt:`Extract JSON: name, dob, passport, gender`
    })
  });

  const json = await res.json();

  const text =
    json.candidates?.[0]?.content?.parts?.[0]?.text || "";

  try{
    return JSON.parse(text.replace(/```/g,"").trim());
  }catch(e){
    return null;
  }
}

async function handle(file,type){

  const img = document.getElementById(type==="a"?"imgA":"imgB");
  const st = document.getElementById(type==="a"?"stA":"stB");

  img.src = URL.createObjectURL(file);

  st.innerHTML = "⏳ Đang xử lý...";

  const base64 = await toBase64(file);

  const data = await callAI(base64,file.type,type);

  if(!data){
    st.innerHTML = "<span class='warn'>⚠ Không đọc được dữ liệu</span>";
    return;
  }

  st.innerHTML = "<span class='ok'>✔ Xong</span>";

  if(type==="a"){
    dataA=data;
    doneA=true;
  } else {
    dataB=data;
    doneB=true;
  }
}

fileA.onchange=e=>handle(e.target.files[0],"a");
fileB.onchange=e=>handle(e.target.files[0],"b");

function norm(v){
  return (v||"").toString().trim().toLowerCase();
}

function compare(){

  if(!doneA || !doneB){
    alert("⏳ Ảnh chưa xử lý xong!");
    return;
  }

  const check=(k)=>{
    return norm(dataA[k])===norm(dataB[k]);
  };

  let html="";

  function row(label,key){
    const ok=check(key);
    html+=`
    <div>
      <b>${label}</b> :
      ${ok? "🟢 OK":"🔴 FAIL"}<br/>
      A: ${dataA[key]}<br/>
      B: ${dataB[key]}<br/><br/>
    </div>`;
  }

  row("NAME","name");
  row("DOB","dob");
  row("PASSPORT","passport");
  row("GENDER","gender");

  const all =
    check("name") &&
    check("dob") &&
    check("passport") &&
    check("gender");

  html+=`
  <hr/>
  <h2 style="text-align:center">
    ${all ? "🟢 PASS" : "🔴 FAIL"}
  </h2>`;

  document.getElementById("out").innerHTML=html;
}
</script>

</body>
</html>
