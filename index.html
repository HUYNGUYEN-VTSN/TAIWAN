<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VISA MATCH PRO</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b1220;
  color:#e8eefc;
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:12px;
}

h1{
  text-align:center;
  color:#4da3ff;
  margin:10px 0 0;
  font-size:20px;
}

.sub{
  text-align:center;
  font-size:12px;
  opacity:.7;
  margin-bottom:10px;
}

/* ===== HORIZONTAL LAYOUT ===== */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* MOBILE */
@media(max-width:768px){
  .grid{
    grid-template-columns:1fr;
  }
}

.card{
  background:#111a2e;
  border:1px solid #22304f;
  border-radius:12px;
  padding:10px;
}

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#1f6fff;
  color:#fff;
  font-weight:600;
  font-size:14px;
  cursor: pointer;
}

img{
  width:100%;
  border-radius:10px;
  margin-top:8px;
  max-height:240px;
  object-fit:contain;
  background:#000;
}

.status{
  margin-top:8px;
  font-size:12px;
  text-align:center;
}

.ok{color:#00e676;font-weight:700}
.bad{color:#ff5252;font-weight:700}
.warn{color:#ffb74d;font-weight:700}

.compare{
  margin-top:12px;
  background:#0f1a33;
  border:1px solid #22304f;
  border-radius:12px;
  padding:10px;
}

.row{
  display:grid;
  grid-template-columns:120px 1fr 1fr;
  gap:6px;
  padding:6px 0;
  border-bottom:1px solid #1c2742;
  font-size:12px;
}

.label{
  color:#8fb3ff;
}

.good{
  color:#00e676;
}

.badc{
  color:#ff5252;
}

.big{
  text-align:center;
  font-size:20px;
  margin-top:10px;
  font-weight:800;
}

.btn-reset {
  display: block;
  margin: 15px auto 0;
  padding: 10px 20px;
  background: #22304f;
  color: #fff;
  border: 1px solid #364973;
  border-radius: 6px;
  cursor: pointer;
}
</style>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
</head>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useRef, useEffect } = React;

// =====================================================================
// CẤU HÌNH PROXY
// =====================================================================
const PROXY_URL = "https://script.google.com/macros/s/AKfycbwiimbbALuE7X_a1mHKo9EPpb-SFGwB9oBFnCAwPM9HiVW5ZXInA_8lrhZZr5hll_P4/exec";
const GEMINI_MODEL = "gemini-2.5-flash-lite"; 

const FIELD_LABELS = {
  name: "Họ tên",
  dob: "Ngày sinh",
  passport: "Số hộ chiếu",
  gender: "Giới tính"
};

function normalizeForCompare(value) {
  if (!value) return "";
  return value.toString().trim().toUpperCase().replace(/\s+/g, " ");
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function getExifOrientation(file) {
  return new Promise((resolve) => {
    if (!file || file.type !== "image/jpeg") { resolve(1); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const view = new DataView(e.target.result);
        if (view.getUint16(0, false) !== 0xffd8) { resolve(1); return; }
        const length = view.byteLength;
        let offset = 2;
        while (offset < length) {
          const marker = view.getUint16(offset, false); offset += 2;
          if (marker === 0xffe1) {
            if (view.getUint32(offset + 2, false) !== 0x45786966) { resolve(1); return; }
            const little = view.getUint16(offset + 8, false) === 0x4949;
            const tiffOffset = offset + 8;
            const dirOffset = tiffOffset + view.getUint32(tiffOffset + 4, little);
            const tagsCount = view.getUint16(dirOffset, little);
            for (let i = 0; i < tagsCount; i++) {
              const entryOffset = dirOffset + 2 + i * 12;
              if (view.getUint16(entryOffset, little) === 0x0112) {
                resolve(view.getUint16(entryOffset + 8, little)); return;
              }
            }
            resolve(1); return;
          } else if ((marker & 0xff00) !== 0xff00) { break; } else { offset += view.getUint16(offset, false); }
        }
        resolve(1);
      } catch (err) { resolve(1); }
    };
    reader.onerror = () => resolve(1);
    reader.readAsArrayBuffer(file.slice(0, 131072));
  });
}

async function resizeImageToBase64(file, maxDimension) {
  const orientation = await getExifOrientation(file);
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      try {
        const srcW = img.width; const srcH = img.height;
        const swapDimensions = orientation >= 5 && orientation <= 8;
        let outW = swapDimensions ? srcH : srcW; let outH = swapDimensions ? srcW : srcH;
        const longest = Math.max(outW, outH);
        if (longest > maxDimension) {
          const scale = maxDimension / longest;
          outW = Math.round(outW * scale); outH = Math.round(outH * scale);
        }
        const canvas = document.createElement("canvas");
        canvas.width = outW; canvas.height = outH;
        const ctx = canvas.getContext("2d");
        const drawW = swapDimensions ? outH : outW; const drawH = swapDimensions ? outW : outH;

        switch (orientation) {
          case 2: ctx.translate(outW, 0); ctx.scale(-1, 1); break;
          case 3: ctx.translate(outW, outH); ctx.rotate(Math.PI); break;
          case 4: ctx.translate(0, outH); ctx.scale(1, -1); break;
          case 5: ctx.rotate(0.5 * Math.PI); ctx.scale(1, -1); break;
          case 6: ctx.rotate(0.5 * Math.PI); ctx.translate(0, -outW); break;
          case 7: ctx.rotate(-0.5 * Math.PI); ctx.translate(-outH, 0); ctx.scale(1, -1); break;
          case 8: ctx.rotate(-0.5 * Math.PI); ctx.translate(-outH, 0); break;
          default: break;
        }

        ctx.drawImage(img, 0, 0, drawW, drawH);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.85);
        URL.revokeObjectURL(url);
        resolve({ base64: dataUrl.split(",")[1], mimeType: "image/jpeg" });
      } catch (e) { URL.revokeObjectURL(url); reject(e); }
    };
    img.onerror = (e) => { URL.revokeObjectURL(url); reject(e); };
    img.src = url;
  });
}

const MAX_UPLOAD_DIMENSION = 1200; 

async function prepareImageForUpload(file) {
  try {
    return await resizeImageToBase64(file, MAX_UPLOAD_DIMENSION);
  } catch (e) {
    const base64 = await fileToBase64(file);
    return { base64, mimeType: file.type || "image/jpeg" };
  }
}

function sleep(ms) { return new Promise((resolve) => setTimeout(resolve, ms)); }

async function callProxyOnce(base64, mimeType, prompt) {
  const response = await fetch(PROXY_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ base64, mimeType, prompt, model: GEMINI_MODEL }),
  });

  const resText = await response.text();
  let data;
  try { data = JSON.parse(resText); } catch(pErr) { data = resText; }

  if (!response.ok) {
    const err = new Error("Lỗi proxy (" + response.status + ")");
    err.status = response.status; throw err;
  }
  if (data && data.error) {
    const err = new Error(data.error);
    err.status = data._status || null; throw err;
  }
  return data;
}

async function extractFields(base64, mimeType) {
  const prompt = `Phân tích ảnh giấy tờ tùy thân (TAC Đài Loan hoặc Visa). Trích xuất chính xác cấu trúc JSON yêu cầu.`;
  const MAX_RETRIES = 2;
  const RETRY_DELAY_MS = 2000;
  let lastErr = null;

  for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
    try {
      const data = await callProxyOnce(base64, mimeType, prompt);
      let text = "";
      
      if (data && data.candidates && data.candidates[0]?.content?.parts) {
        text = data.candidates[0].content.parts.map(p => p.text || "").join("");
      } else if (typeof data === "string") {
        text = data;
      } else if (data && typeof data === "object") {
        if(data.name !== undefined) return data;
      }

      let cleaned = text.replace(/```json|```/g, "").trim();
      const firstBrace = cleaned.indexOf("{");
      const lastBrace = cleaned.lastIndexOf("}");
      if (firstBrace !== -1 && lastBrace !== -1) {
        cleaned = cleaned.slice(firstBrace, lastBrace + 1);
      }

      return JSON.parse(cleaned);
    } catch (err) {
      lastErr = err;
      const isTransient = err.status === 429 || err.status === 503 || /429|quota|overloaded/i.test(err.message || "");
      if (!isTransient || attempt === MAX_RETRIES) throw err;
      await sleep(RETRY_DELAY_MS);
    }
  }
  throw lastErr;
}

// =====================================================================
// COMPONENT RENDER (SỬ DỤNG HOÀN TOÀN TRONG REACT STATE)
// =====================================================================
function ImageSlot({ title, onSelect, status, previewUrl }) {
  const fileInputRef = useRef(null);

  const handleChange = (e) => {
    const file = e.target.files[0];
    if (file) onSelect(file);
  };

  return (
    <div className="card">
      <button className="btn" onClick={() => fileInputRef.current.click()}>📷 {title}</button>
      <input 
        type="file" 
        ref={fileInputRef} 
        accept="image/*" 
        capture="environment" 
        style={{ display: "none" }} 
        onChange={handleChange}
      />
      {previewUrl && <img src={previewUrl} alt={title} />}
      <div className={`status ${status.type || ""}`}>{status.text}</div>
    </div>
  );
}

function App() {
  const [slotA, setSlotA] = useState({ file: null, preview: null, status: { text: "Chưa xử lý", type: "" }, data: null });
  const [slotB, setSlotB] = useState({ file: null, preview: null, status: { text: "Chưa xử lý", type: "" }, data: null });
  const [globalStatus, setGlobalStatus] = useState("Chờ dữ liệu...");

  const processFile = async (file, setSlot) => {
    setSlot(prev => ({ ...prev, file, preview: URL.createObjectURL(file), status: { text: "🔄 Đang xử lý ảnh...", type: "warn" }, data: null }));
    try {
      const prepared = await prepareImageForUpload(file);
      setSlot(prev => ({ ...prev, status: { text: "⚡ Đang gửi AI đọc...", type: "warn" } }));
      
      const result = await extractFields(prepared.base64, prepared.mimeType);
      setSlot(prev => ({ ...prev, status: { text: "✅ Đọc thành công", type: "ok" }, data: result }));
    } catch (err) {
      setSlot(prev => ({ ...prev, status: { text: `❌ Lỗi: ${err.message}`, type: "bad" }, data: null }));
    }
  };

  const handleSelectA = (file) => processFile(file, setSlotA);
  const handleSelectB = (file) => processFile(file, setSlotB);

  const reset = () => {
    setSlotA({ file: null, preview: null, status: { text: "Chưa xử lý", type: "" }, data: null });
    setSlotB({ file: null, preview: null, status: { text: "Chưa xử lý", type: "" }, data: null });
    setGlobalStatus("Chờ dữ liệu...");
  };

  // Tự động đối chiếu thông tin khi cả 2 bên đều có kết quả từ AI
  const renderCompare = () => {
    if (slotA.status.type === "warn" || slotB.status.type === "warn") {
      return <div>⏳ Hệ thống đang đọc và xử lý thông tin...</div>;
    }
    if (!slotA.data || !slotB.data) {
      return <div>⏳ Chờ đủ dữ liệu từ cả 2 ảnh TAC và VISA...</div>;
    }

    let allMatch = true;
    const rows = Object.keys(FIELD_LABELS).map(key => {
      const valA = slotA.data[key] || "";
      const valB = slotB.data[key] || "";
      const match = normalizeForCompare(valA) === normalizeForCompare(valB);
      if (!match) allMatch = false;

      return (
        <div className="row" key={key}>
          <div className="label">{FIELD_LABELS[key]}</div>
          <div className={match ? "good" : "badc"}>{valA || "N/A"}</div>
          <div className={match ? "good" : "badc"}>{valB || "N/A"}</div>
        </div>
      );
    });

    return (
      <div>
        <div className="row" style={{ fontWeight: "bold", borderBottom: "2px solid #22304f" }}>
          <div className="label">Trường thông tin</div>
          <div>Dữ liệu TAC</div>
          <div>Dữ liệu VISA</div>
        </div>
        {rows}
        <div className={`big ${allMatch ? "good" : "badc"}`}>
          {allMatch ? "✓ HỢP LỆ (KHỚP DỮ LIỆU)" : "✕ KHÔNG HỢP LỆ (LỆCH DỮ LIỆU)"}
        </div>
      </div>
    );
  };

  return (
    <div className="wrap">
      <h1>VISA MATCH PRO</h1>
      <div className="sub">TAC • VISA • REALTIME CHECK</div>

      <div className="grid">
        <ImageSlot title="TAC" onSelect={handleSelectA} status={slotA.status} previewUrl={slotA.preview} />
        <ImageSlot title="VISA" onSelect={handleSelectB} status={slotB.status} previewUrl={slotB.preview} />
      </div>

      <div className="compare">
        {renderCompare()}
      </div>

      {(slotA.file || slotB.file) && (
        <button className="btn-reset" onClick={reset}>⟲ Làm lại</button>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
